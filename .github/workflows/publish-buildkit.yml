# publish-buildkit.yml
#
# Triggered by pushing a tag of the exact form sdk-buildkit-vX.Y.Z
# (three-component semver only — e.g. git tag sdk-buildkit-v0.2.0 &&
# git push origin sdk-buildkit-v0.2.0).
#
# The floating major tag sdk-buildkit-v1 is maintained IN this workflow
# (scarguard pattern) so consumers never have to force-push it manually:
#   - On every versioned release the workflow clobbers the tarball on the
#     sdk-buildkit-v1 release and re-points the tag to the current commit.
#
# Consumer contract:
#   Pin to exact version:    gh release download sdk-buildkit-v0.2.0 ...
#   Follow floating major:   gh release download sdk-buildkit-v1     ...
#   (sdk-buildkit-v1 always points at the latest backwards-compatible release.)
#
# Workflow steps:
#   1. Check out the factory repo.
#   2. Set up Python 3.11.
#   3. Install PyYAML (the only non-stdlib dependency needed at build time).
#   4. Download the latest released compliance pak from its own repo
#      (sentania-labs/vcf-content-factory-sdk-compliance) as the reference pak.
#      This avoids compiling anything here — adapter source lives in each
#      adapter's own repo; Broadcom JARs are not available in public CI and
#      must not ship in the buildkit tarball.
#   5. Run build-buildkit to assemble the tarball (jar-free, see buildkit.py).
#   6. Create the versioned GitHub Release and attach the tarball.
#   7. Maintain the floating sdk-buildkit-v1 release (clobber tarball + retag).
#
# Note: no JDK setup step — nothing compiles in this workflow.

name: Publish sdk-buildkit

on:
  push:
    tags:
      # Strict three-component semver only — floating major tags (sdk-buildkit-v1)
      # must NOT re-trigger this workflow; they are maintained below.
      - "sdk-buildkit-v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write   # needed for gh release create / edit / upload

jobs:
  publish-buildkit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out factory repo
        uses: actions/checkout@v4
        with:
          # Fetch full history so the builder can generate CHANGELOG from git log
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install pyyaml

      - name: Download compliance reference pak
        # Fetch the latest released compliance pak from its own repo.
        # This pak is used as the pak-compare reference bundled inside the kit.
        # We do NOT compile anything here — adapter source lives in its own repo
        # and Broadcom JARs are not available in public CI (and must not ship
        # in the buildkit tarball per the redistribution survey 2026-06-09).
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist/
          gh release download \
            --repo sentania-labs/vcf-content-factory-sdk-compliance \
            --pattern '*.pak' \
            --dir dist/
          echo "Downloaded reference pak(s):"
          ls -lh dist/*.pak

      - name: Extract version from tag
        id: ver
        run: |
          # Tag is sdk-buildkit-vX.Y.Z; strip the prefix to get X.Y.Z
          VERSION="${GITHUB_REF_NAME#sdk-buildkit-v}"
          MAJOR="$(echo "$VERSION" | cut -d. -f1)"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "major=${MAJOR}" >> "$GITHUB_OUTPUT"
          echo "tarball=sdk-buildkit-${VERSION}.tgz" >> "$GITHUB_OUTPUT"
          echo "floating_tag=sdk-buildkit-v${MAJOR}" >> "$GITHUB_OUTPUT"

      - name: Assemble buildkit tarball
        run: |
          python3 -m vcfops_managementpacks build-buildkit \
            --output dist/ \
            --version "${{ steps.ver.outputs.version }}"

      - name: Verify tarball contains no Broadcom JARs
        # Hard gate: the kit must not ship any Broadcom platform jars.
        # Forbidden: vrops-adapters-sdk, alive_*, aria-ops-core, mpb_adapter*, vmware-ops-api-stubs
        run: |
          TARBALL="dist/${{ steps.ver.outputs.tarball }}"
          echo "Checking tarball contents for Broadcom JARs..."
          BROADCOM_COUNT=$(tar tzf "$TARBALL" | grep -cE \
            'vrops-adapters-sdk|alive_common|alive_platform|aria-ops-core|mpb_adapter|vmware-ops-api-stubs' \
            || true)
          if [ "$BROADCOM_COUNT" -gt 0 ]; then
            echo "ERROR: Tarball contains ${BROADCOM_COUNT} Broadcom JAR(s) — aborting."
            tar tzf "$TARBALL" | grep -E 'vrops-adapters-sdk|alive_common|alive_platform|aria-ops-core|mpb_adapter|vmware-ops-api-stubs'
            exit 1
          fi
          echo "OK: no Broadcom JARs found in tarball."
          echo "Tarball contents:"
          tar tzf "$TARBALL"

      - name: Create versioned GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FLOATING="${{ steps.ver.outputs.floating_tag }}"
          # Build release notes from the checked-in template, substituting version
          # placeholders. The template lives at .github/release-notes-buildkit.md
          # to keep multi-line markdown out of this YAML file entirely.
          sed \
            -e 's/@FLOATING_TAG@/${{ steps.ver.outputs.floating_tag }}/g' \
            -e 's/@REF_NAME@/${{ github.ref_name }}/g' \
            -e 's/@VERSION@/${{ steps.ver.outputs.version }}/g' \
            .github/release-notes-buildkit.md > /tmp/release-notes.md
          gh release create "${{ github.ref_name }}" \
            "dist/${{ steps.ver.outputs.tarball }}" \
            --repo "${{ github.repository }}" \
            --title "sdk-buildkit v${{ steps.ver.outputs.version }}" \
            --notes-file /tmp/release-notes.md

      - name: Maintain floating major release (${{ steps.ver.outputs.floating_tag }})
        # Scarguard pattern: keep sdk-buildkit-v1 (or vN) pointing at this commit
        # so consumers that pin the floating major get the latest kit automatically.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FLOATING="${{ steps.ver.outputs.floating_tag }}"
          TARBALL="dist/${{ steps.ver.outputs.tarball }}"

          # Re-point the floating tag to this commit (force-create locally,
          # then force-push — safe because this is a managed floating pointer,
          # not a version record).
          git tag -f "$FLOATING" "${{ github.sha }}"
          git push origin "$FLOATING" --force

          FLOAT_NOTES="$(printf 'Floating major pointer \xe2\x80\x94 always the latest backwards-compatible release.\nCurrently: v%s (%s).\nPin to `%s` for a reproducible exact version.' \
            '${{ steps.ver.outputs.version }}' \
            '${{ github.ref_name }}' \
            '${{ github.ref_name }}')"

          # Create-or-update the floating release:
          # Try to upload (clobber) onto an existing release; if the release
          # does not exist yet, create it.
          if gh release view "$FLOATING" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "Floating release ${FLOATING} exists — clobbering tarball."
            gh release upload "$FLOATING" "$TARBALL" \
              --repo "${{ github.repository }}" \
              --clobber
            # Also update the release title/notes to reflect the new version.
            gh release edit "$FLOATING" \
              --repo "${{ github.repository }}" \
              --title "sdk-buildkit ${FLOATING} (→ v${{ steps.ver.outputs.version }})" \
              --notes "$FLOAT_NOTES"
          else
            echo "Floating release ${FLOATING} does not exist — creating."
            gh release create "$FLOATING" "$TARBALL" \
              --repo "${{ github.repository }}" \
              --title "sdk-buildkit ${FLOATING} (→ v${{ steps.ver.outputs.version }})" \
              --notes "$FLOAT_NOTES"
          fi
