name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # Fork-gate: do not run on PRs from outside the org (prevents RCE on runners)
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.owner.login == 'sentania-labs'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the framework-review reminder can diff a PR
          # against its base (merge-base needs reachable history).
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        # Test deps (pytest, pytest-xdist pin) live in requirements-dev.txt
        # so local and CI environments install the identical toolchain.
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Bootstrap SDK adapter repos
        run: bash scripts/bootstrap_managed_paks.sh

      - name: Framework-review reminder (non-blocking, P4)
        # Nudge only — emits a ::warning:: when a PR changes vcfops_*/ with
        # no context/reviews/framework/ doc. The real gate is the
        # orchestrator spawning `framework-reviewer` before the PR
        # (CLAUDE.md / designs/framework-reviewer-v1.md). Never fails the
        # build: a doc-existence gate would be rubber-stampable and could
        # wedge legitimate hotfixes.
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags --quiet origin "${{ github.event.pull_request.base.ref }}" || true
          bash scripts/check_framework_review.sh "origin/${{ github.event.pull_request.base.ref }}"

      - name: Run pytest (all tests)
        # pytest.ini sets addopts=-m "not slow" for fast local runs.
        # CI must run the FULL suite, so we override addopts to clear the
        # default marker filter and add -n auto for parallel execution.
        # -m "" means "no marker filter" (run everything including slow).
        run: |
          python3 -m pytest tests/ --collect-only -q 2>&1 | tee /tmp/collect.txt
          python3 -m pytest tests/ -v --tb=short -n auto --dist=loadgroup --override-ini="addopts=" -m ""

      - name: Validate content corpus
        run: |
          python3 -m vcfops_supermetrics validate
          python3 -m vcfops_dashboards validate
          python3 -m vcfops_customgroups validate
          python3 -m vcfops_symptoms validate
          python3 -m vcfops_alerts validate
          python3 -m vcfops_reports validate
          python3 -m vcfops_managementpacks validate
