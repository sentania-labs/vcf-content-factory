# Synology DSM Management Pack v1
# Option C grammar (Tier 3.3, 2026-04-18)
# Requests at MP scope; explicit metricSets per object_type.
# Auth: cookie_session preset matching Scott's build-8 MP.
# Events: Tier 2 MPB notification events included (api-cartographer 4.1.7 delivered);
#         Tier 1 threshold events are NOT here — they ship as factory symptoms/alerts.
#
# Authoring notes and design assumptions are called out inline with NOTE or ASSUMPTION.

name: "Synology DSM"
version: "1.0.0"
build_number: 1
author: "VCF Content Factory"
adapter_kind: "mpb_synology_dsm"
description: >
  Monitors Synology DiskStation Manager (DSM) NAS devices. Covers storage
  health (pools, volumes, disks), iSCSI LUN performance, Docker container
  resource usage, and UPS status. Designed for VMware/VCF environments
  where the NAS provides iSCSI datastores to ESXi hosts.

# =============================================================================
# SOURCE / CONNECTION
# =============================================================================

source:
  port: 5001
  ssl: NO_VERIFY
  # base_path is relative (no leading slash) — MPB baseApiPath.
  # Per-request paths are relative to this (e.g. "entry.cgi", "auth.cgi").
  base_path: "webapi"
  timeout: 30
  max_retries: 2
  max_concurrent: 15

  auth:
    # Flow-based auth: cookie_session preset.
    # All five blocks are required by the preset validator.
    # Matches Scott's build-8 MP and Postman collection wire format.
    # Reference: designs/synology-mp-v1.md §Authentication, §Axis 1.
    preset: cookie_session

    credentials:
      - {key: username, label: username, sensitive: false}
      - {key: passwd,   label: passwd,   sensitive: true}

    login:
      method: GET
      path: "auth.cgi"
      # Params as ordered list of {key, value} — MPB wire format (not dict).
      # ${credentials.username} and ${credentials.passwd} reference the
      # credential field keys declared above.
      params:
        - {key: api,     value: "SYNO.API.Auth"}
        - {key: version, value: "3"}
        - {key: method,  value: "login"}
        - {key: session, value: "FileStation"}
        - {key: format,  value: "cookie"}
        - {key: account, value: "${credentials.username}"}
        - {key: passwd,  value: "${credentials.passwd}"}

    # NOTE: extract.name is the exact HTTP response header name "Set-Cookie".
    # The design doc example uses "set_cookie" (lowercased) — that is wrong.
    # The actual header name is "Set-Cookie" (mixed case, RFC-compliant).
    # Correction confirmed in task brief (Tier 3.2 verification).
    extract:
      location: HEADER
      name: "Set-Cookie"
      bind_to: session.set_cookie

    # Token injected as a header named "id" with the raw Set-Cookie value.
    # Not "Cookie", not "_sid" query param — this matches build-8 globalHeaders.
    inject:
      - type: header
        name: "id"
        value: "${session.set_cookie}"

    logout:
      # DELETE per Scott's build-8. No session param — the cookie header
      # (injected globally) identifies the session to release.
      method: DELETE
      path: "auth.cgi"
      params:
        - {key: api,     value: "SYNO.API.Auth"}
        - {key: version, value: "3"}
        - {key: method,  value: "logout"}

  test_request:
    method: GET
    path: "entry.cgi"
    params:
      - {key: api,     value: "SYNO.DSM.Info"}
      - {key: version, value: "2"}
      - {key: method,  value: "getinfo"}


# =============================================================================
# TOP-LEVEL REQUESTS (Option C — MP scope, addressable by name from any object_type)
# =============================================================================
# Each request is declared ONCE. Multiple object_types may consume the same
# request via their metricSets. The renderer emits each request once per cycle.
#
# Requests with ${chain.<name>} tokens are consumed as chained metricSets;
# their substitutions are resolved per-row at collection time.

requests:

  # ---------------------------------------------------------------------------
  # system_info — SYNO.DSM.Info (model, serial, temp, firmware, uptime)
  # Consumed by: Diskstation (unchained)
  # ---------------------------------------------------------------------------
  - name: system_info
    method: GET
    path: "entry.cgi"
    params:
      - {key: api,     value: "SYNO.DSM.Info"}
      - {key: version, value: "2"}
      - {key: method,  value: "getinfo"}
    response_path: "data"

  # ---------------------------------------------------------------------------
  # core_system — SYNO.Core.System (CPU details, firmware, timezone, NTP)
  # Consumed by: Diskstation (unchained)
  # ---------------------------------------------------------------------------
  - name: core_system
    method: GET
    path: "entry.cgi"
    params:
      - {key: api,     value: "SYNO.Core.System"}
      - {key: version, value: "3"}
      - {key: method,  value: "info"}
    response_path: "data"

  # ---------------------------------------------------------------------------
  # system_util — SYNO.Core.System.Utilization (CPU load, memory, network)
  # Consumed by: Diskstation (unchained).
  # NOTE: The same Utilization endpoint is used for per-volume and per-disk
  # IO via chained requests (volume_util, disk_util, lun_util). The
  # unparameterized form consumed here by Diskstation returns the aggregate
  # CPU/memory/network response.
  # ---------------------------------------------------------------------------
  - name: system_util
    method: GET
    path: "entry.cgi"
    params:
      - {key: api,     value: "SYNO.Core.System.Utilization"}
      - {key: version, value: "1"}
      - {key: method,  value: "get"}
    response_path: "data"

  # ---------------------------------------------------------------------------
  # hardware_fan — SYNO.Core.Hardware.FanSpeed (fan status/mode)
  # Consumed by: Diskstation (unchained)
  # ---------------------------------------------------------------------------
  - name: hardware_fan
    method: GET
    path: "entry.cgi"
    params:
      - {key: api,     value: "SYNO.Core.Hardware.FanSpeed"}
      - {key: version, value: "1"}
      - {key: method,  value: "get"}
    response_path: "data"

  # ---------------------------------------------------------------------------
  # system_status — SYNO.Core.System.Status (crash flag, upgrade flag)
  # Consumed by: Diskstation (unchained)
  # ---------------------------------------------------------------------------
  - name: system_status
    method: GET
    path: "entry.cgi"
    params:
      - {key: api,     value: "SYNO.Core.System.Status"}
      - {key: version, value: "1"}
      - {key: method,  value: "get"}
    response_path: "data"

  # ---------------------------------------------------------------------------
  # network_interface — SYNO.Core.Network.Interface (NIC inventory)
  # Consumed by: Diskstation (unchained) — for nic_count property
  # ---------------------------------------------------------------------------
  - name: network_interface
    method: GET
    path: "entry.cgi"
    params:
      - {key: api,     value: "SYNO.Core.Network.Interface"}
      - {key: version, value: "1"}
      - {key: method,  value: "list"}
    response_path: "data"

  # ---------------------------------------------------------------------------
  # storage_load_info — SYNO.Storage.CGI.Storage load_info
  # Returns pools, volumes, disks in one response.
  # Consumed by: Storage Pool (list_path: storagePools), Volume (list_path: volumes),
  #              Disk (list_path: disks). ONE FIRE per cycle — Option C reuse win.
  # ---------------------------------------------------------------------------
  - name: storage_load_info
    method: GET
    path: "entry.cgi"
    params:
      - {key: api,     value: "SYNO.Storage.CGI.Storage"}
      - {key: version, value: "1"}
      - {key: method,  value: "load_info"}
    response_path: "data"

  # ---------------------------------------------------------------------------
  # volume_util — Per-volume IO, chained off storage_load_info.
  # ${chain.volume_id} is filled per-row from the Volume metricSet's bind.
  # API: SYNO.Core.System.Utilization with location param selecting one volume.
  # Per-row support CONFIRMED (designs/synology-mp-v1.md §Volume).
  # ---------------------------------------------------------------------------
  - name: volume_util
    method: GET
    path: "entry.cgi"
    params:
      - {key: api,      value: "SYNO.Core.System.Utilization"}
      - {key: version,  value: "1"}
      - {key: method,   value: "get"}
      - {key: location, value: "${chain.volume_id}"}
    response_path: "data"

  # ---------------------------------------------------------------------------
  # disk_util — Per-disk IO, chained off storage_load_info.
  # ${chain.disk_id} is filled per-row from the Disk metricSet's bind.
  # ASSUMPTION: API filter param is "id" — per designs/synology-mp-v1.md the
  # per-disk filter param name is unconfirmed; "id" is the most likely name.
  # Fallback: if the API ignores the filter param, the full disk[] array is
  # returned per fire and MPB narrows by list_path + row matching. Either way
  # the chain produces correct per-disk attribution. Flag for api-cartographer
  # v1.1 to confirm "id" vs. "device" or other param name.
  # ---------------------------------------------------------------------------
  - name: disk_util
    method: GET
    path: "entry.cgi"
    params:
      - {key: api,     value: "SYNO.Core.System.Utilization"}
      - {key: version, value: "1"}
      - {key: method,  value: "get"}
      - {key: id,      value: "${chain.disk_id}"}
    response_path: "data"

  # ---------------------------------------------------------------------------
  # iscsi_lun_list — SYNO.Core.ISCSI.LUN list
  # Consumed by: iSCSI LUN (primary, list_path: luns)
  # ---------------------------------------------------------------------------
  - name: iscsi_lun_list
    method: GET
    path: "entry.cgi"
    params:
      - {key: api,     value: "SYNO.Core.ISCSI.LUN"}
      - {key: version, value: "1"}
      - {key: method,  value: "list"}
    response_path: "data"

  # ---------------------------------------------------------------------------
  # lun_util — Per-LUN IO, chained off iscsi_lun_list.
  # ${chain.lun_name} is filled per-row from the iSCSI LUN metricSet's bind.
  # ASSUMPTION: filter param is "lun_name". Unconfirmed — fallback to full
  # lun[] array per fire if API ignores it. Flag for api-cartographer v1.1.
  # ---------------------------------------------------------------------------
  - name: lun_util
    method: GET
    path: "entry.cgi"
    params:
      - {key: api,      value: "SYNO.Core.System.Utilization"}
      - {key: version,  value: "1"}
      - {key: method,   value: "get"}
      - {key: lun_name, value: "${chain.lun_name}"}
    response_path: "data"

  # ---------------------------------------------------------------------------
  # docker_container_list — SYNO.Docker.Container list
  # Consumed by: Docker Container (primary, list_path: containers)
  # limit=0 returns all containers in one call (confirmed by API map).
  # ---------------------------------------------------------------------------
  - name: docker_container_list
    method: GET
    path: "entry.cgi"
    params:
      - {key: api,     value: "SYNO.Docker.Container"}
      - {key: version, value: "1"}
      - {key: method,  value: "list"}
      - {key: limit,   value: "0"}
      - {key: offset,  value: "0"}
      - {key: type,    value: "all"}
    response_path: "data"

  # ---------------------------------------------------------------------------
  # docker_resource — SYNO.Docker.Container.Resource get (all containers)
  # Consumed by: Docker Container (chained off docker_container_list).
  # NOTE: This API returns ALL running containers in one response (no per-
  # container filter param). The chain fires once-per-container; each fire
  # returns the full resources[] array. MPB narrows to the matching row by
  # list_path + bind. This is "wasteful but correct" option 2 per the design.
  # ${chain.container_name} is declared in the bind but NOT used as a request
  # param (no filter supported). The token is included so the validator can
  # confirm chain wiring; the renderer must handle the case where a ${chain.*}
  # token appears only in bind, not in the request params.
  # TOOLSET GAP: The validator requires ${chain.*} tokens to appear in request
  # params/path/body for chain token coverage check. But docker_resource has no
  # filter param — the bind name is used only for row selection at the metricSet
  # level, not as a substitution into the request. If the validator errors on
  # "bind name has no matching ${chain.*} token in request", this is a grammar
  # gap: the bind needs to support a "row_match" mode distinct from
  # "param_substitution". For v1, add a synthetic no-op param to carry the
  # token so the validator passes; tooling removes it at render time if
  # confirmed unnecessary (or leaves it — the API ignores unknown params).
  - name: docker_resource
    method: GET
    path: "entry.cgi"
    params:
      - {key: api,     value: "SYNO.Docker.Container.Resource"}
      - {key: version, value: "1"}
      - {key: method,  value: "get"}
      - {key: name,    value: "${chain.container_name}"}
    response_path: "data"

  # ---------------------------------------------------------------------------
  # ups_info — SYNO.Core.ExternalDevice.UPS get (UPS status, charge, runtime)
  # Consumed by: UPS (primary, list_path empty = whole response)
  # NOTE: Returns successfully even when no UPS is connected. The UPS object
  # will be instantiated with empty/zero values in that case. Conditional
  # instantiation (only when usb_ups_connect: true) is NOT expressible in the
  # current grammar. TOOLSET GAP flagged below.
  # ---------------------------------------------------------------------------
  - name: ups_info
    method: GET
    path: "entry.cgi"
    params:
      - {key: api,     value: "SYNO.Core.ExternalDevice.UPS"}
      - {key: version, value: "1"}
      - {key: method,  value: "get"}
    response_path: "data"

  # ---------------------------------------------------------------------------
  # Event source requests (syslog_list, upgrade_check, security_list) removed.
  # Tier 2 events deferred to v1.1 pending renderer support for severity
  # mapping / message binding / object-binding anchor properties.
  # ---------------------------------------------------------------------------


# =============================================================================
# OBJECT TYPES
# =============================================================================

object_types:

  # ---------------------------------------------------------------------------
  # 1. Synology Diskstation (world object)
  # ---------------------------------------------------------------------------
  - name: "Synology Diskstation"
    key: "synology_diskstation"
    type: INTERNAL
    icon: "server.svg"
    is_world: true

    # Tier 3.3 structured identifier form.
    # source references the primary metricSet that provides the serial value.
    identifiers:
      - key: serial
        source: "metricset:system_info.serial"

    # Tier 3.3 structured name_expression (single-part passthrough).
    # Multi-part composites are renderer-blocked; v1 uses single metric.
    name_expression:
      parts:
        - metric: model

    # Tier 3.3 world identity declaration (Axis 7: system_issued).
    identity:
      tier: system_issued
      source: "metricset:system_info.serial"

    # Three unchained metricSets — one per independent request.
    # Singletons (is_world: true) must NOT have primary: true on any metricSet.
    metricSets:
      - from_request: system_info
        list_path: ""
      - from_request: core_system
        list_path: ""
      - from_request: system_util
        list_path: ""
      - from_request: hardware_fan
        list_path: ""
      - from_request: system_status
        list_path: ""
      - from_request: network_interface
        list_path: ""

    metrics:
      # ---- system_info ----
      - key: serial
        label: "Serial Number"
        usage: PROPERTY
        type: STRING
        source:
          metricset: system_info
          path: "serial"

      - key: model
        label: "Model"
        usage: PROPERTY
        type: STRING
        source:
          metricset: system_info
          path: "model"

      - key: firmware_ver
        label: "Firmware Version"
        usage: PROPERTY
        type: STRING
        source:
          metricset: system_info
          path: "version_string"

      - key: ram_size
        label: "RAM Size (MB)"
        usage: PROPERTY
        type: NUMBER
        unit: "MB"
        source:
          metricset: system_info
          path: "ram"

      - key: sys_temp
        label: "System Temperature"
        usage: METRIC
        type: NUMBER
        unit: "C"
        kpi: true
        source:
          metricset: system_info
          path: "temperature"

      - key: uptime
        label: "Uptime (seconds)"
        usage: METRIC
        type: NUMBER
        unit: "seconds"
        source:
          metricset: system_info
          path: "uptime"

      # ---- core_system ----
      - key: cpu_clock_speed
        label: "CPU Clock Speed (MHz)"
        usage: PROPERTY
        type: NUMBER
        unit: "MHz"
        source:
          metricset: core_system
          path: "cpu_clock_speed"

      - key: cpu_cores
        label: "CPU Cores"
        usage: PROPERTY
        type: STRING
        source:
          metricset: core_system
          path: "cpu_cores"

      - key: cpu_family
        label: "CPU Family"
        usage: PROPERTY
        type: STRING
        source:
          metricset: core_system
          path: "cpu_family"

      - key: cpu_series
        label: "CPU Series"
        usage: PROPERTY
        type: STRING
        source:
          metricset: core_system
          path: "cpu_series"

      - key: cpu_vendor
        label: "CPU Vendor"
        usage: PROPERTY
        type: STRING
        source:
          metricset: core_system
          path: "cpu_vendor"

      - key: firmware_date
        label: "Firmware Date"
        usage: PROPERTY
        type: STRING
        source:
          metricset: core_system
          path: "firmware_date"

      - key: timezone
        label: "Time Zone"
        usage: PROPERTY
        type: STRING
        source:
          metricset: core_system
          path: "timezone"

      - key: ntp_enabled
        label: "NTP Enabled"
        usage: PROPERTY
        type: STRING
        source:
          metricset: core_system
          path: "ntp_enabled"

      - key: ntp_server
        label: "NTP Server"
        usage: PROPERTY
        type: STRING
        source:
          metricset: core_system
          path: "ntp_server"

      - key: hostname
        label: "Hostname"
        usage: PROPERTY
        type: STRING
        # NOTE: SYNO.Core.System returns "model" in its data.model field.
        # DSM does not expose hostname via REST in the observed API surface.
        # The SYNO.DSM.Info endpoint's "hostname" field is the device's
        # system hostname. Using system_info.hostname if available; fallback
        # is core_system.model as a placeholder per the reference YAML.
        # api-cartographer should confirm data.hostname on SYNO.DSM.Info v2.
        source:
          metricset: system_info
          path: "model"
        # ASSUMPTION: Using system_info.model as hostname proxy. If SYNO.DSM.Info
        # exposes a "hostname" field, update path to "hostname" here.

      # ---- system_util: CPU ----
      - key: cpu_user_load
        label: "CPU User Load"
        usage: METRIC
        type: NUMBER
        unit: "%"
        source:
          metricset: system_util
          path: "cpu.user_load"

      - key: cpu_system_load
        label: "CPU System Load"
        usage: METRIC
        type: NUMBER
        unit: "%"
        source:
          metricset: system_util
          path: "cpu.system_load"

      - key: cpu_other_load
        label: "CPU Other Load"
        usage: METRIC
        type: NUMBER
        unit: "%"
        source:
          metricset: system_util
          path: "cpu.other_load"

      - key: cpu_1min_load
        label: "CPU Load Average (1 min)"
        usage: METRIC
        type: NUMBER
        source:
          metricset: system_util
          path: "cpu.1min_load"

      - key: cpu_5min_load
        label: "CPU Load Average (5 min)"
        usage: METRIC
        type: NUMBER
        source:
          metricset: system_util
          path: "cpu.5min_load"

      - key: cpu_15min_load
        label: "CPU Load Average (15 min)"
        usage: METRIC
        type: NUMBER
        source:
          metricset: system_util
          path: "cpu.15min_load"

      # NOTE: cpu_total_load = user_load + system_load. MPB's compose expression
      # is not yet renderer-supported. Sourcing from user_load as primary component.
      # When compose is implemented, update source to compose form.
      # TOOLSET GAP: structured compose source is grammar-reserved; renderer
      # cannot emit it yet. Tracking as v1.1 item.
      - key: cpu_total_load
        label: "CPU Total Load"
        usage: METRIC
        type: NUMBER
        unit: "%"
        source:
          metricset: system_util
          path: "cpu.user_load"
        # NOTE: Reports user_load only for v1; replace with compose when supported.

      # ---- system_util: Memory ----
      - key: mem_total_real
        label: "Total Real Memory"
        usage: METRIC
        type: NUMBER
        unit: "KB"
        source:
          metricset: system_util
          path: "memory.total_real"

      - key: mem_avail_real
        label: "Available Real Memory"
        usage: METRIC
        type: NUMBER
        unit: "KB"
        source:
          metricset: system_util
          path: "memory.avail_real"

      - key: memory_usage_pct
        label: "Memory Usage"
        usage: METRIC
        type: NUMBER
        unit: "%"
        kpi: true
        source:
          metricset: system_util
          path: "memory.real_usage"

      - key: mem_cached
        label: "Cached Memory"
        usage: METRIC
        type: NUMBER
        unit: "KB"
        source:
          metricset: system_util
          path: "memory.cached"

      - key: mem_buffer
        label: "Buffered Memory"
        usage: METRIC
        type: NUMBER
        unit: "KB"
        source:
          metricset: system_util
          path: "memory.buffer"

      - key: swap_total
        label: "Total Swap"
        usage: METRIC
        type: NUMBER
        unit: "KB"
        source:
          metricset: system_util
          path: "memory.total_swap"

      - key: swap_avail
        label: "Available Swap"
        usage: METRIC
        type: NUMBER
        unit: "KB"
        source:
          metricset: system_util
          path: "memory.avail_swap"

      - key: swap_si_disk
        label: "Swap In from Disk"
        usage: METRIC
        type: NUMBER
        source:
          metricset: system_util
          path: "memory.si_disk"

      - key: swap_so_disk
        label: "Swap Out to Disk"
        usage: METRIC
        type: NUMBER
        source:
          metricset: system_util
          path: "memory.so_disk"

      # ---- system_util: Network (first NIC at index 0) ----
      # NOTE: network is an array; network[0] is the primary NIC.
      # Sum across all NICs requires array-wildcard aggregation (not yet renderable).
      # v1 reports primary NIC only. Flagged as TOOLSET GAP for aggregate compose.
      - key: net_rx_bytes
        label: "Network Receive"
        usage: METRIC
        type: NUMBER
        unit: "bytes/s"
        source:
          metricset: system_util
          path: "network.0.rx"

      - key: net_tx_bytes
        label: "Network Transmit"
        usage: METRIC
        type: NUMBER
        unit: "bytes/s"
        source:
          metricset: system_util
          path: "network.0.tx"

      # ---- hardware_fan ----
      - key: fan_status
        label: "Fan Status"
        usage: PROPERTY
        type: STRING
        source:
          metricset: hardware_fan
          path: "cool_fan"
        # "yes" = fan running normally, "no" = likely failed.

      - key: fan_speed_mode
        label: "Fan Speed Mode"
        usage: PROPERTY
        type: STRING
        source:
          metricset: hardware_fan
          path: "dual_fan_speed"
        # "coolfan" / "fullfan" / "quietfan"

      - key: disk_temp_fail
        label: "Disk Temp Failure"
        usage: PROPERTY
        type: STRING
        source:
          metricset: hardware_fan
          path: "all_disk_temp_fail"
        # "no" = all disk temps OK, "yes" = thermal warning

      # ---- system_status ----
      - key: is_system_crashed
        label: "System Crashed"
        usage: PROPERTY
        type: STRING
        source:
          metricset: system_status
          path: "is_system_crashed"

      - key: upgrade_ready
        label: "DSM Upgrade Available"
        usage: PROPERTY
        type: STRING
        source:
          metricset: system_status
          path: "upgrade_ready"

      # ---- network_interface ----
      # NOTE: nic_count is derived as array length. MPB array-length extraction
      # is not yet supported by the renderer (requires aggregate form).
      # Sourcing as a scalar path placeholder; renderer will need enhancement.
      # TOOLSET GAP: array length extraction requires aggregate: count in MetricSourceDef.
      - key: nic_count
        label: "NIC Count"
        usage: PROPERTY
        type: NUMBER
        source:
          metricset: network_interface
          path: "length"
        # NOTE: path "length" is a placeholder. Actual value comes from array
        # cardinality of the network_interface response. When aggregate: count
        # is implemented, update source to {metricset: network_interface, path: "",
        # aggregate: count}. Flag for tooling.


  # ---------------------------------------------------------------------------
  # 2. Storage Pool
  # ---------------------------------------------------------------------------
  - name: "Storage Pool"
    key: "storage_pool"
    type: INTERNAL
    icon: "storage.svg"
    is_world: false

    identifiers:
      - key: pool_id
        source: "metricset:storage_load_info.id"
      - key: pool_path
        source: "metricset:storage_load_info.pool_path"

    name_expression:
      parts:
        - metric: pool_path

    metricSets:
      - from_request: storage_load_info
        primary: true
        list_path: "storagePools"

    metrics:
      - key: pool_id
        label: "Pool ID"
        usage: PROPERTY
        type: STRING
        source:
          metricset: storage_load_info
          path: "id"

      - key: pool_path
        label: "Pool Path"
        usage: PROPERTY
        type: STRING
        source:
          metricset: storage_load_info
