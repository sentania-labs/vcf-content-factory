  # ---------------------------------------------------------------------------
  # 7. UPS
  # ---------------------------------------------------------------------------
  - name: "UPS"
    key: "ups"
    type: INTERNAL
    icon: "ups.svg"
    is_world: false

    identifiers:
      - key: model
        source: "metricset:ups_info.model"

    name_expression:
      parts:
        - metric: model

    # Single metricSet; whole response.
    metricSets:
      - from_request: ups_info
        primary: true
        list_path: ""

    # TOOLSET GAP: Conditional instantiation — UPS object should only be
    # created when usb_ups_connect: true. The current grammar has no
    # filter/predicate for conditional object instantiation. A UPS object
    # will be created even when no UPS is connected (model will be empty
    # string, all metrics will be zero/unknown). This is acceptable for v1
    # but may create confusing zero-value UPS objects. Flag for tooling to
    # add an instantiation_filter: field on object_type (e.g.
    # instantiation_filter: {field: usb_ups_connect, operator: EQUALS, value: "true"})
    # as a v1.1 grammar addition.

    metrics:
      - key: model
        label: "Model"
        usage: PROPERTY
        type: STRING
        source:
          metricset: ups_info
          path: "model"

      - key: vendor
        label: "Vendor"
        usage: PROPERTY
        type: STRING
        source:
          metricset: ups_info
          path: "manufacture"
        # NOTE: API field is "manufacture" (not "vendor") per api-maps/synology-ups.md.

      - key: status
        label: "Status"
        usage: PROPERTY
        type: STRING
        source:
          metricset: ups_info
          path: "status"
        # NUT status codes: OL (online), OB (on battery), LB (low battery).
        # "usb_ups_status_unknown" when no UPS connected.

      - key: ups_enabled
        label: "UPS Enabled"
        usage: PROPERTY
        type: STRING
        source:
          metricset: ups_info
          path: "enable"

      - key: ups_connected
        label: "UPS Connected"
        usage: PROPERTY
        type: STRING
        source:
          metricset: ups_info
          path: "usb_ups_connect"

      - key: ups_mode
        label: "UPS Mode"
        usage: PROPERTY
        type: STRING
        source:
          metricset: ups_info
          path: "mode"
        # "MASTER" (USB) or "SLAVE" (network UPS server)

      - key: delay_time
        label: "Shutdown Delay"
        usage: PROPERTY
        type: NUMBER
        source:
          metricset: ups_info
          path: "delay_time"
        # Seconds; -1 when not configured.

      - key: shutdown_device
        label: "Shutdown Device"
        usage: PROPERTY
        type: STRING
        source:
          metricset: ups_info
          path: "shutdown_device"

      - key: battery_charge
        label: "Battery Charge"
        usage: METRIC
        type: NUMBER
        unit: "%"
        kpi: true
        source:
          metricset: ups_info
          path: "charge"
        # NOTE: API field is "charge" (not "battery_charge") per api-maps/synology-ups.md.

      - key: runtime
        label: "Runtime Remaining"
        usage: METRIC
        type: NUMBER
        unit: "seconds"
        source:
          metricset: ups_info
          path: "runtime"
        # NOTE: UPS load (%) is not available via REST; requires SNMP.


# =============================================================================
# RELATIONSHIPS (7)
# =============================================================================
# scope: adapter_instance — trivial containment; renderer synthesizes the
#   wire-level predicate. No child_expression / parent_expression allowed.
# scope: field_match — value-join; child_expression + parent_expression required.
#
# Relationship keys reference object_type.key values (lowercase_underscored).

relationships:

  # #1: Diskstation → Storage Pool (adapter-instance trivial)
  # All pools belong to the one NAS; no shared join field.
  - parent: synology_diskstation
    child: storage_pool
    scope: adapter_instance

  # #2: Storage Pool → Volume (field_match: pool_path == pool_path)
  # Direct string equality. Evidence: api-maps/synology-storage.md §"Storage Pool → Volume".
  - parent: storage_pool
    child: volume
    scope: field_match
    child_expression: pool_path
    parent_expression: pool_path

  # #3: Volume → iSCSI LUN (field_match: location == volume_path)
  # Both sides carry leading slash in v1; direct equality.
  # Evidence: api-maps/synology-iscsi.md §"Volume → iSCSI LUN".
  # Normalization note: if a DSM firmware version returns location without the
  # leading slash, tooling should add a regex strip transform rather than
  # silently mismatching. Flag for renderer.
  - parent: volume
    child: iscsi_lun
    scope: field_match
    child_expression: location
    parent_expression: volume_path

  # #4: Storage Pool → Disk (field_match: used_by == pool_id)
  # Disk.used_by carries the pool ID (e.g. "reuse_1").
  # Evidence: api-maps/synology-storage.md §"Storage Pool → Disk".
  - parent: storage_pool
    child: disk
    scope: field_match
    child_expression: used_by
    parent_expression: pool_id

  # #5: Diskstation → Disk (adapter-instance trivial; dual-parent alongside #4)
  # All disks are direct children of the Diskstation. No disk field references
  # the NAS serial directly. Dual-parent pattern supported per Rubrik MP reference.
  - parent: synology_diskstation
    child: disk
    scope: adapter_instance

  # #6: Diskstation → Docker Container (adapter-instance trivial)
  # All containers are direct children of the Diskstation.
  - parent: synology_diskstation
    child: docker_container
    scope: adapter_instance

  # #7: Diskstation → UPS (adapter-instance trivial, 0:1)
  # One UPS per NAS at most; direct child.
  - parent: synology_diskstation
    child: ups
    scope: adapter_instance


