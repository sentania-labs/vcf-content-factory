# Synology DSM MP — Chain-1 Diagnostic (roundtrip + one chained metricSet)
# ============================================================
# Base: synology_dsm_roundtrip.yaml (build 8 mirror, zero chained metricSets)
# Delta: adds exactly ONE chained metricSet to the Volume object type.
#
# Purpose: minimal reproducer to isolate chaining renderer behavior.
#   If this imports/validates/collects cleanly on MPB, the chain renderer works.
#   If it fails, the failure is attributable to the single chain added here.
#
# Scope: roundtrip baseline + one chain.
#   Objects: 4 (Synology Diskstation, Volume, Disks, Storage Pool)
#   Requests: 10 total (9 roundtrip + 1 new: volume_util)
#   Relationships: 1 (Storage Pool → Volume by pool_path == ID)
#   Events: 0
#
# Chain added:
#   Volume object: chained metricSet from_request: volume_util,
#   chained_from: get_volumes (the primary metricSet),
#   bind: volume_id from_attribute: id (volume row's "id" field, e.g. "reuse_1")
#   The volume_util request injects ${chain.volume_id} as the "location" param.
#   2 IO metrics: io_read_iops (space.volume.read_access),
#                 io_write_iops (space.volume.write_access)
#
# Ambiguity notes carried over from roundtrip:
#   [A1] Storage Pool list path: reference listId is "data.*.*" which implies a
#        doubly-nested array. With response_path: "data" the list_path is "pools.*"
#        (the named sub-array) vs. "*.*" (wildcard). The reference uses "data.*.*"
#        in the MPB schema — this is an artifact of how MPB model auto-assigns
#        wildcard IDs. The real data path from the API is data.pools[*]. We use
#        list_path "pools.*" here; the validator cannot verify this — flag for
#        import test.
#   [A2] "Disks" vs "Physical Disk": reference objectTypeLabel is "Disks". The
#        design doc calls it "Physical Disk". This file uses "Disks" to match the
#        reference exactly.
#   [A3] response_path: "data" is set on all requests. Field paths are expressed
#        relative to the data key (i.e., "data." prefix stripped). This is a
#        factory convention choice; the reference stores full paths from root.
#   [A4] LUNs, Storage Info, and Network Info are declared as requests in the
#        reference but consumed by no object's metricSet. They are included here
#        to mirror the reference exactly. The validator may warn about unused
#        requests; this is expected.
#   [A5] The relationship in the reference is "Storage Pool → Volume" with
#        child_expression: Volume.pool_path and parent_expression: StoragePool.ID.
#        The parent metric label is "ID" (STRING, pool identity). Expressed here
#        as field_match with child_expression: pool_path, parent_expression: id.

name: "Synology DSM (Chain-1)"
version: "1.0.0"
build_number: 1
author: "VCF Content Factory"
adapter_kind: "mpb_synology_dsm_chain1"
description: >
  Chaining renderer diagnostic. Roundtrip baseline (build-8 mirror) with exactly
  one chained metricSet added on the Volume object type. Used to isolate chaining
  renderer behavior — not for production use.

# =============================================================================
# SOURCE / CONNECTION
# =============================================================================
# Mirrors reference: port 5001 (defaultValue), NO_VERIFY, base webapi, 30s timeout,
# 2 retries, 15 concurrent. Default SSL in reference is VERIFY but build-8
# connection config shows NO_VERIFY — using NO_VERIFY per the connection block.

source:
  port: 5001
  ssl: NO_VERIFY
  base_path: "webapi"
  timeout: 30
  max_retries: 2
  max_concurrent: 15

  auth:
    # CUSTOM credentialType in reference maps to cookie_session preset.
    # Credential fields: username (not sensitive) + passwd (sensitive).
    # Labels match the reference creds blocks exactly.
    preset: cookie_session

    credentials:
      - {key: username, label: username, sensitive: false}
      - {key: passwd,   label: passwd,   sensitive: true}

    # Get Session → auth.login
    # Reference: method=GET, path=auth.cgi, params as listed below.
    # Param order matches reference exactly.
    login:
      method: GET
      path: "auth.cgi"
      params:
        - {key: api,     value: "SYNO.API.Auth"}
        - {key: version, value: "3"}
        - {key: method,  value: "login"}
        - {key: account, value: "${credentials.username}"}
        - {key: passwd,  value: "${credentials.passwd}"}
        - {key: session, value: "FileStation"}
        - {key: format,  value: "cookie"}

    # sessionVariables[0]: key="Set-Cookie", path=["Set-Cookie"], location=HEADER
    # → extract from HTTP response header "Set-Cookie"
    extract:
      location: HEADER
      name: "Set-Cookie"
      bind_to: session.set_cookie

    # globalHeaders[1]: key="id", type=CUSTOM, value="${authentication.session.set_cookie}"
    # → inject as header "id" with the raw Set-Cookie value.
    inject:
      - type: header
        name: "id"
        value: "${session.set_cookie}"

    # Release Session → auth.logout
    # Reference: method=DELETE, path=auth.cgi
    logout:
      method: DELETE
      path: "auth.cgi"
      params:
        - {key: method,  value: "logout"}
        - {key: version, value: "3"}
        - {key: api,     value: "SYNO.API.Auth"}

  # Test connection uses the FileStation Info request (same as the reference testRequest).
  test_request:
    method: GET
    path: "entry.cgi"
    params:
      - {key: api,     value: "SYNO.FileStation.Info"}
      - {key: method,  value: "get"}
      - {key: version, value: "2"}


# =============================================================================
# REQUESTS (9 total — mirrors reference exactly)
# =============================================================================
# response_path: "data" on each request; all field paths are relative to the
# data key. [A3]

requests:

  # ---------------------------------------------------------------------------
  # 1. Utilization — SYNO.Core.System.Utilization
  # Consumed by: Synology Diskstation (metricSet on base list)
  # ---------------------------------------------------------------------------
  - name: utilization
    method: GET
    path: "entry.cgi"
    params:
      - {key: api,     value: "SYNO.Core.System.Utilization"}
      - {key: version, value: "1"}
      - {key: method,  value: "get"}
    response_path: "data"

  # ---------------------------------------------------------------------------
  # 2. FileStation — SYNO.FileStation.Info
  # Consumed by: Synology Diskstation (metricSet on base list, 1 metric: hostname)
  # ---------------------------------------------------------------------------
  - name: filestation
    method: GET
    path: "entry.cgi"
    params:
      - {key: api,     value: "SYNO.FileStation.Info"}
      - {key: version, value: "1"}
      - {key: method,  value: "get"}
    response_path: "data"

  # ---------------------------------------------------------------------------
  # 3. LUNs — SYNO.Core.ISCSI.LUN list
  # NOTE: Not consumed by any object in the reference. Included to mirror exactly. [A4]
  # ---------------------------------------------------------------------------
  - name: luns
    method: GET
    path: "entry.cgi"
    params:
      - {key: api,     value: "SYNO.Core.ISCSI.LUN"}
      - {key: version, value: "1"}
      - {key: method,  value: "list"}
    response_path: "data"

  # ---------------------------------------------------------------------------
  # 4. System — SYNO.Core.System info (v3)
  # Consumed by: Synology Diskstation (metricSet on base list, 15 metrics)
  # ---------------------------------------------------------------------------
  - name: system
    method: GET
    path: "entry.cgi"
    params:
      - {key: api,     value: "SYNO.Core.System"}
      - {key: version, value: "3"}
      - {key: method,  value: "info"}
    response_path: "data"

  # ---------------------------------------------------------------------------
  # 5. Storage Info — SYNO.Core.System info (type=storage, v1)
  # NOTE: Not consumed by any object in the reference. Included to mirror exactly. [A4]
  # ---------------------------------------------------------------------------
  - name: storage_info
    method: GET
    path: "entry.cgi"
    params:
      - {key: api,     value: "SYNO.Core.System"}
      - {key: type,    value: "storage"}
      - {key: method,  value: "info"}
      - {key: version, value: "1"}
    response_path: "data"

  # ---------------------------------------------------------------------------
  # 6. Network Info — SYNO.Core.System info (type=network, v1)
  # NOTE: Not consumed by any object in the reference. Included to mirror exactly. [A4]
  # ---------------------------------------------------------------------------
  - name: network_info
    method: GET
    path: "entry.cgi"
    params:
      - {key: api,     value: "SYNO.Core.System"}
      - {key: type,    value: "network"}
      - {key: version, value: "1"}
      - {key: method,  value: "info"}
    response_path: "data"

  # ---------------------------------------------------------------------------
  # 7. Get Volumes — SYNO.Core.Storage.Volume list
  # Consumed by: Volume (primary metricSet, list_path: volumes.*)
  # ---------------------------------------------------------------------------
  - name: get_volumes
    method: GET
    path: "entry.cgi"
    params:
      - {key: version,  value: "1"}
      - {key: method,   value: "list"}
      - {key: location, value: "internal"}
      - {key: offset,   value: "0"}
      - {key: limit,    value: "-1"}
      - {key: api,      value: "SYNO.Core.Storage.Volume"}
    response_path: "data"

  # ---------------------------------------------------------------------------
  # 8. Get Disks — SYNO.Core.Storage.Disk list
  # Consumed by: Disks (primary metricSet, list_path: disks.*)
  # ---------------------------------------------------------------------------
  - name: get_disks
    method: GET
    path: "entry.cgi"
    params:
      - {key: api,      value: "SYNO.Core.Storage.Disk"}
      - {key: method,   value: "list"}
      - {key: version,  value: "1"}
      - {key: location, value: "internal"}
      - {key: limit,    value: "-1"}
      - {key: offset,   value: "0"}
    response_path: "data"

  # ---------------------------------------------------------------------------
  # 9. Get Storage Pools — SYNO.Core.Storage.Pool list
  # Consumed by: Storage Pool (primary metricSet, list_path: pools.*)
  # [A1] Reference listId is "data.*.*" — using "pools.*" as the named path.
  # ---------------------------------------------------------------------------
  - name: get_storage_pools
    method: GET
    path: "entry.cgi"
    params:
      - {key: api,     value: "SYNO.Core.Storage.Pool"}
      - {key: method,  value: "list"}
      - {key: limit,   value: "-1"}
      - {key: offset,  value: "0"}
      - {key: version, value: "1"}
    response_path: "data"

  # ---------------------------------------------------------------------------
  # 10. volume_util — Per-volume IO (CHAIN-1 ADDITION)
  # Chained off the Volume primary metricSet (get_volumes).
  # ${chain.volume_id} is substituted per-row from the bind in the Volume
  # chained metricSet: bind.from_attribute: id (the volume row's "id" field,
  # e.g. "reuse_1"). Mirrors the volume_util request in synology_dsm.yaml.
  # ---------------------------------------------------------------------------
  - name: volume_util
    method: GET
    path: "entry.cgi"
    params:
      - {key: api,      value: "SYNO.Core.System.Utilization"}
      - {key: version,  value: "1"}
      - {key: method,   value: "get"}
      - {key: location, value: "${chain.volume_id}"}
    response_path: "data"


# =============================================================================
# OBJECT TYPES (4)
# =============================================================================

object_types:

  # ---------------------------------------------------------------------------
  # 1. Synology Diskstation (singleton / world object)
  #    isListObject: false in reference (3 metricSets, none primary)
  #    icon: media-changer.svg (reference value)
  #    identifier: Serial (data.serial from System request)
  #    name_expression: Hostname (data.hostname from FileStation request)
  # ---------------------------------------------------------------------------
  - name: "Synology Diskstation"
    key: "synology_diskstation"
    type: INTERNAL
    icon: "media-changer.svg"
    is_world: true

    # Reference identifierIds resolves to the "Serial" metric.
    # Serial is in the System metricSet at path data.serial.
    identifiers:
      - key: serial
        source: "metricset:system.serial"

    # Reference nameMetricExpression points to the "Hostname" metric.
    # Hostname is in the FileStation metricSet at path data.hostname.
    name_expression:
      parts:
        - metric: hostname

    # World identity: system-issued serial number.
    identity:
      tier: system_issued
      source: "metricset:system.serial"

    # 3 metricSets, none primary (singleton object — no list iteration).
    # Order: System, FileStation, Utilization (matches reference metricSets[0..2]).
    metricSets:
      - from_request: system
        list_path: ""
      - from_request: filestation
        list_path: ""
      - from_request: utilization
        list_path: ""

    metrics:
      # ---- From System (SYNO.Core.System v3, base list) ----
      # All field paths: data.<field> → with response_path: "data" → <field>

      - key: cpu_clock_speed
        label: "CPU Clock Speed"
        usage: PROPERTY
        type: NUMBER
        unit: ""
        source:
          metricset: system
          path: "cpu_clock_speed"

      - key: cpu_cores
        label: "CPU Cores"
        usage: PROPERTY
        type: NUMBER
        unit: ""
        source:
          metricset: system
          path: "cpu_cores"

      - key: cpu_family
        label: "CPU Family"
        usage: PROPERTY
        type: STRING
        source:
          metricset: system
          path: "cpu_family"

      - key: cpu_series
        label: "CPU Series"
        usage: PROPERTY
        type: STRING
        source:
          metricset: system
          path: "cpu_series"

      - key: cpu_vendor
        label: "CPU Vendor"
        usage: PROPERTY
        type: STRING
        source:
          metricset: system
          path: "cpu_vendor"

      - key: enabled_ntp
        label: "Enabled Ntp"
        usage: PROPERTY
        type: STRING
        source:
          metricset: system
          path: "enabled_ntp"

      - key: firmware_date
        label: "Firmware Date"
        usage: PROPERTY
        type: STRING
        source:
          metricset: system
          path: "firmware_date"

      - key: firmware_ver
        label: "Firmware Ver"
        usage: PROPERTY
        type: STRING
        source:
          metricset: system
          path: "firmware_ver"

      - key: model
        label: "Model"
        usage: PROPERTY
        type: STRING
        source:
          metricset: system
          path: "model"

      - key: ntp_server
        label: "Ntp Server"
        usage: PROPERTY
        type: STRING
        source:
          metricset: system
          path: "ntp_server"

      - key: ram_size
        label: "RAM Size"
        usage: PROPERTY
        type: NUMBER
        unit: "gigabyte"
        source:
          metricset: system
          path: "ram_size"

      # [ID] Serial — also the identifier
      - key: serial
        label: "Serial"
        usage: PROPERTY
        type: STRING
        source:
          metricset: system
          path: "serial"

      - key: sys_temp
        label: "Sys Temp"
        usage: METRIC
        type: NUMBER
        unit: ""
        source:
          metricset: system
          path: "sys_temp"

      - key: time_zone_desc
        label: "Time Zone Desc"
        usage: PROPERTY
        type: STRING
        source:
          metricset: system
          path: "time_zone_desc"

      - key: up_time
        label: "Up Time"
        usage: PROPERTY
        type: STRING
        source:
          metricset: system
          path: "up_time"

      # ---- From FileStation (SYNO.FileStation.Info v1, base list) ----
      # 1 metric only

      # name_expression metric — data.hostname
      - key: hostname
        label: "Hostname"
        usage: PROPERTY
        type: STRING
        source:
          metricset: filestation
          path: "hostname"

      # ---- From Utilization (SYNO.Core.System.Utilization v1, base list) ----
      # 17 metrics: 6 CPU + 11 memory

      - key: load_15min
        label: "15min Load"
        usage: METRIC
        type: NUMBER
        unit: ""
        source:
          metricset: utilization
          path: "cpu.15min_load"

      - key: load_1min
        label: "1min Load"
        usage: METRIC
        type: NUMBER
        unit: ""
        source:
          metricset: utilization
          path: "cpu.1min_load"

      - key: load_5min
        label: "5min Load"
        usage: METRIC
        type: NUMBER
        unit: ""
        source:
          metricset: utilization
          path: "cpu.5min_load"

      - key: cpu_other_load
        label: "Other Load"
        usage: METRIC
        type: NUMBER
        unit: ""
        source:
          metricset: utilization
          path: "cpu.other_load"

      - key: cpu_system_load
        label: "System Load"
        usage: METRIC
        type: NUMBER
        unit: ""
        source:
          metricset: utilization
          path: "cpu.system_load"

      - key: cpu_user_load
        label: "User Load"
        usage: METRIC
        type: NUMBER
        unit: ""
        source:
          metricset: utilization
          path: "cpu.user_load"

      - key: mem_avail_real
        label: "Avail Real"
        usage: METRIC
        type: NUMBER
        unit: ""
        source:
          metricset: utilization
          path: "memory.avail_real"

      - key: mem_avail_swap
        label: "Avail Swap"
        usage: METRIC
        type: NUMBER
        unit: ""
        source:
          metricset: utilization
          path: "memory.avail_swap"

      - key: mem_buffer
        label: "Buffer"
        usage: METRIC
        type: NUMBER
        unit: ""
        source:
          metricset: utilization
          path: "memory.buffer"

      - key: mem_cached
        label: "Cached"
        usage: METRIC
        type: NUMBER
        unit: ""
        source:
          metricset: utilization
          path: "memory.cached"

      - key: memory_size
        label: "Memory Size"
        usage: METRIC
        type: NUMBER
        unit: ""
        source:
          metricset: utilization
          path: "memory.memory_size"

      - key: mem_real_usage
        label: "Real Usage"
        usage: METRIC
        type: NUMBER
        unit: ""
        source:
          metricset: utilization
          path: "memory.real_usage"

      - key: mem_si_disk
        label: "Si Disk"
        usage: METRIC
        type: NUMBER
        unit: ""
        source:
          metricset: utilization
          path: "memory.si_disk"

      - key: mem_so_disk
        label: "So Disk"
        usage: METRIC
        type: NUMBER
        unit: ""
        source:
          metricset: utilization
          path: "memory.so_disk"

      - key: swap_usage
        label: "Swap Usage"
        usage: METRIC
        type: NUMBER
        unit: ""
        source:
          metricset: utilization
          path: "memory.swap_usage"

      - key: mem_total_real
        label: "Total Real"
        usage: METRIC
        type: NUMBER
        unit: ""
        source:
          metricset: utilization
          path: "memory.total_real"

      - key: mem_total_swap
        label: "Total Swap"
        usage: METRIC
        type: NUMBER
        unit: ""
        source:
          metricset: utilization
          path: "memory.total_swap"


  # ---------------------------------------------------------------------------
  # 2. Volume (list object)
  #    isListObject: true, icon: hard-drive-disks.svg
  #    request: Get Volumes, listId: data.volumes.* → list_path: "volumes.*"
  #    identifiers: Volume Path + Pool Path (composite)
  #    name_expression: Display Name
  # ---------------------------------------------------------------------------
  - name: "Volume"
    key: "volume"
    type: INTERNAL
    icon: "hard-drive-disks.svg"
    is_world: false

    # Reference identifierIds: iN2b4ViPMi4QniBJUJdCYM (Volume Path) +
    #                           cA1ZReJWms1ECBnKVBq8od (Pool Path)
    identifiers:
      - key: volume_path
        source: "metricset:get_volumes.volume_path"
      - key: pool_path
        source: "metricset:get_volumes.pool_path"

    # Reference nameMetricExpression → "Display Name" metric
    name_expression:
      parts:
        - metric: display_name

    # Two metricSets: primary (get_volumes) + chained (volume_util). [CHAIN-1 ADDITION]
    metricSets:
      - from_request: get_volumes
        primary: true
        list_path: "volumes.*"

      # CHAIN-1 ADDITION: per-volume IO from SYNO.Core.System.Utilization.
      # chained_from references the sibling primary metricSet's from_request name.
      # bind: volume row "id" field (e.g. "reuse_1") → chain variable volume_id
      # → injected as "location" param in the volume_util request.
      - from_request: volume_util
        chained_from: get_volumes
        list_path: "space.volume"
        bind:
          - name: volume_id
            from_attribute: id

    metrics:
      # ---- From Get Volumes (SYNO.Core.Storage.Volume, data.volumes.* items) ----
      # Field paths are attributes on each volumes[] element.

      - key: description
        label: "Description"
        usage: PROPERTY
        type: STRING
        source:
          metricset: get_volumes
          path: "description"

      - key: display_name
        label: "Display Name"
        usage: PROPERTY
        type: STRING
        source:
          metricset: get_volumes
          path: "display_name"

      - key: fs_type
        label: "Fs Type"
        usage: PROPERTY
        type: STRING
        source:
          metricset: get_volumes
          path: "fs_type"

      # [ID] Pool Path
      - key: pool_path
        label: "Pool Path"
        usage: PROPERTY
        type: STRING
        source:
          metricset: get_volumes
          path: "pool_path"

      - key: raid_type
        label: "RAID Type"
        usage: PROPERTY
        type: STRING
        source:
          metricset: get_volumes
          path: "raid_type"

      - key: size_free_byte
        label: "Size Free Byte"
        usage: METRIC
        type: NUMBER
        unit: ""
        source:
          metricset: get_volumes
          path: "size_free_byte"

      - key: size_total_byte
        label: "Size Total Byte"
        usage: METRIC
        type: NUMBER
        unit: ""
        source:
          metricset: get_volumes
          path: "size_total_byte"

      - key: status
        label: "Status"
        usage: PROPERTY
        type: STRING
        source:
          metricset: get_volumes
          path: "status"

      - key: volume_id
        label: "Volume ID"
        usage: PROPERTY
        type: NUMBER
        unit: ""
        source:
          metricset: get_volumes
          path: "volume_id"

      # [ID] Volume Path
      - key: volume_path
        label: "Volume Path"
        usage: PROPERTY
        type: STRING
        source:
          metricset: get_volumes
          path: "volume_path"

      # ---- From volume_util (chained) — CHAIN-1 ADDITION ----
      # Field paths confirmed from synology_dsm.yaml and api-maps.
      # response_path: "data" already set on volume_util; paths are relative to data.
      - key: io_read_iops
        label: "Read IOPS"
        usage: METRIC
        type: NUMBER
        unit: "IOPS"
        source:
          metricset: volume_util
          path: "space.volume.read_access"

      - key: io_write_iops
        label: "Write IOPS"
        usage: METRIC
        type: NUMBER
        unit: "IOPS"
        source:
          metricset: volume_util
          path: "space.volume.write_access"


  # ---------------------------------------------------------------------------
  # 3. Disks (list object)  [A2]
  #    isListObject: true, icon: storage.svg
  #    request: Get Disks, listId: data.disks.* → list_path: "disks.*"
  #    identifier: Serial
  #    name_expression: Name
  # ---------------------------------------------------------------------------
  - name: "Disks"
    key: "disks"
    type: INTERNAL
    icon: "storage.svg"
    is_world: false

    # Reference identifierIds: w8b4Y7EVvSojkMgLH2Pjdx → "Serial" metric
    identifiers:
      - key: serial
        source: "metricset:get_disks.serial"

    # Reference nameMetricExpression → "Name" metric
    name_expression:
      parts:
        - metric: name

    # Single metricSet, primary: true (list object)
    metricSets:
      - from_request: get_disks
        primary: true
        list_path: "disks.*"

    metrics:
      # ---- From Get Disks (SYNO.Core.Storage.Disk, data.disks.* items) ----

      - key: device
        label: "Device"
        usage: PROPERTY
        type: STRING
        source:
          metricset: get_disks
          path: "device"

      - key: firm
        label: "Firm"
        usage: PROPERTY
        type: STRING
        source:
          metricset: get_disks
          path: "firm"

      - key: model
        label: "Model"
        usage: PROPERTY
        type: STRING
        source:
          metricset: get_disks
          path: "model"

      - key: name
        label: "Name"
        usage: PROPERTY
        type: STRING
        source:
          metricset: get_disks
          path: "name"

      # [ID] Serial
      - key: serial
        label: "Serial"
        usage: PROPERTY
        type: STRING
        source:
          metricset: get_disks
          path: "serial"

      - key: size_total
        label: "Size Total"
        usage: METRIC
        type: NUMBER
        unit: ""
        source:
          metricset: get_disks
          path: "size_total"

      - key: slot_id
        label: "Slot ID"
        usage: METRIC
        type: NUMBER
