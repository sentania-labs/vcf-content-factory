# Synology DSM MP — KISS (Keep It Simple, Stupid) Diagnostic
# ============================================================
# Purpose: minimal viable MP to prove MPB end-to-end collection path.
#   One request (SYNO.Core.System.Utilization, unfiltered).
#   One object type (Volume, iterated from data.space.volume[]).
#   No chaining, no enrichment, no cross-request joins.
#
# Root cause of chain1 failure: SYNO.Core.System.Utilization already returns
# data.space.volume[] as a list with per-volume IO in the single unfiltered
# call — chaining was never necessary. Confirmed from live API 2026-04-20.
#
# Live response shape (storage.int.sentania.net:5001):
#   {"data": {"space": {"volume": [
#     {"device":"dm-4","display_name":"volume1","read_access":1,
#      "read_byte":21845,"utilization":8,"write_access":16,"write_byte":320853}
#   ]}}, "success": true}
#
# If this fails on import, the failure is attributable to something in the
# MPB runtime below the level of chaining: connect, fetch, iterate, or emit.

name: "Synology DSM (KISS)"
version: "1.0.0"
build_number: 1
author: "VCF Content Factory"
adapter_kind: "mpb_synology_dsm_kiss"
description: >
  Minimal viable Synology MP proving MPB end-to-end collection path.
  One request, one object, no chaining. Use for MPB validation diagnostics.


# =============================================================================
# SOURCE / CONNECTION
# =============================================================================
# Copied verbatim from synology_dsm_chain1.yaml — same NAS, same credentials
# envelope. Changes: none.

source:
  port: 5001
  ssl: NO_VERIFY
  base_path: "webapi"
  timeout: 30
  max_retries: 2
  max_concurrent: 15

  auth:
    preset: cookie_session

    credentials:
      - {key: username, label: username, sensitive: false}
      - {key: passwd,   label: passwd,   sensitive: true}

    login:
      method: GET
      path: "auth.cgi"
      params:
        - {key: api,     value: "SYNO.API.Auth"}
        - {key: version, value: "3"}
        - {key: method,  value: "login"}
        - {key: account, value: "${credentials.username}"}
        - {key: passwd,  value: "${credentials.passwd}"}
        - {key: session, value: "FileStation"}
        - {key: format,  value: "cookie"}

    extract:
      location: HEADER
      name: "Set-Cookie"
      bind_to: session.set_cookie

    inject:
      - type: header
        name: "id"
        value: "${session.set_cookie}"

    logout:
      method: DELETE
      path: "auth.cgi"
      params:
        - {key: method,  value: "logout"}
        - {key: version, value: "3"}
        - {key: api,     value: "SYNO.API.Auth"}

  test_request:
    method: GET
    path: "entry.cgi"
    params:
      - {key: api,     value: "SYNO.FileStation.Info"}
      - {key: method,  value: "get"}
      - {key: version, value: "2"}


# =============================================================================
# REQUESTS (1)
# =============================================================================
# Single unfiltered utilization call. No "location" param — returns all volumes
# in data.space.volume[]. response_path: "data" strips the outer data key;
# metric paths are expressed relative to data (e.g. "space.volume.*").

requests:
  - name: utilization
    method: GET
    path: "entry.cgi"
    params:
      - {key: api,     value: "SYNO.Core.System.Utilization"}
      - {key: version, value: "1"}
      - {key: method,  value: "get"}
    response_path: "data"


# =============================================================================
# OBJECT TYPES (2)
# =============================================================================
# MPB requires exactly one is_world: true object type as the adapter root.
# We add a minimal "Synology NAS" singleton sourced from the same utilization
# request (list_path: "" — consumes the whole data object as a scalar context).
# No second request needed; total request count stays at 1.

object_types:
  # ---------------------------------------------------------------------------
  # 1. Synology NAS (world singleton)
  #    Required MPB root anchor. Sourced from the utilization request.
  #    Identifier: connection address (no stable device serial in this endpoint).
  #    One metric: cpu user load — proves the scalar read path works.
  # ---------------------------------------------------------------------------
  - name: "Synology NAS"
    key: "synology_nas"
    type: INTERNAL
    icon: "media-changer.svg"
    is_world: true

    identifiers:
      - key: cpu_user_load
        source: "metricset:utilization.cpu_user_load"

    identity:
      tier: connection_address
      source: "metricset:utilization.cpu_user_load"

    name_expression:
      parts:
        - literal: "Synology NAS"

    metricSets:
      - from_request: utilization
        list_path: ""

    metrics:
      - key: cpu_user_load
        label: "CPU User Load"
        usage: METRIC
        type: NUMBER
        unit: "%"
        source:
          metricset: utilization
          path: "cpu.user_load"

  # ---------------------------------------------------------------------------
  # 2. Volume (list object)
  # ---------------------------------------------------------------------------
  - name: "Volume"
    key: "volume"
    type: INTERNAL
    icon: "hard-drive-disks.svg"
    is_world: false

    # Single string-keyed identifier: display_name from the utilization list.
    # system_issued tier — display_name is stable across collections.
    identifiers:
      - key: display_name
        source: "metricset:utilization.display_name"

    # Single-metric name expression using the identifier field.
    name_expression:
      parts:
        - metric: display_name

    # One metricSet, primary: true. list_path iterates data.space.volume[].
    # With response_path: "data", the path relative to data is "space.volume.*".
    metricSets:
      - from_request: utilization
        primary: true
        list_path: "space.volume.*"

    metrics:
      # [ID] Display Name — also the identifier and name expression
      - key: display_name
        label: "Display Name"
        usage: PROPERTY
        type: STRING
        source:
          metricset: utilization
          path: "display_name"

      - key: read_access
        label: "Read IOPS"
        usage: METRIC
        type: NUMBER
        unit: "IOPS"
        source:
          metricset: utilization
          path: "read_access"

      - key: write_access
        label: "Write IOPS"
        usage: METRIC
        type: NUMBER
        unit: "IOPS"
        source:
          metricset: utilization
          path: "write_access"

      - key: utilization
        label: "Utilization"
        usage: METRIC
        type: NUMBER
        unit: "%"
        source:
          metricset: utilization
          path: "utilization"


# =============================================================================
# RELATIONSHIPS (0)
# =============================================================================
# None. Single object type — nothing to relate.


# =============================================================================
# EVENTS (0)
# =============================================================================

mpb_events: []


# =============================================================================
# CONTENT
# =============================================================================

content:
  dashboards: []
  views: []
