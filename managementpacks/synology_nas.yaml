- name: Synology NAS World
  key: mpb_synology_nas_world
  type: INTERNAL
  icon: default.svg
  is_world: true
  identity:
    tier: connection_address
    source: metricset
  # identifiers: intentionally empty — world kinds carry no ResourceIdentifier
  # elements in MPB wire format (confirmed: synology_nas_working_describe.xml).
  # Loader currently rejects empty identifiers unconditionally — this requires
  # a TOOLSET GAP fix: guard the "at least one identifier" check with
  # `not ot.is_world` (loader.py line ~650).
  identifiers: []
relationships:
- parent: storage_pool
  child: volume
  scope: field_match
  parent_expression: pool_path
  child_expression: pool_path
- parent: storage_pool
  child: disks
  scope: field_match
  parent_expression: id
  child_expression: used_by
- parent: volume
  child: iscsi_lun
  scope: field_match
  parent_expression: volume_path
  child_expression: location
