# Extracted from MPB exchange format — review before use.
# Keys, list_paths, and source paths are derived from MPB's internal
# structure and may need adjustment. Verify:
#   - metric keys (slug-derived from MPB labels)
#   - list_path values (derived from metricSet.listId)
#   - response_path values (inferred from DML id prefix)
#   - identity.tier on world object (set to 'system_issued' as placeholder)
#   - name_expression (derived from nameMetricExpression)
#   - relationships parent_expression / child_expression (label-derived)
#
# This file round-trips through render-export to a semantically
# equivalent MPB design. Byte-for-byte match with the source is not
# a goal — UUIDs will differ (factory uses UUID5, MPB uses UUID4).
name: Synology NAS
version: 1.0.0
build_number: 1
author: "VCF Content Factory"
adapter_kind: "mpb_synology_nas"
description: Monitors a Synology DiskStation NAS running DSM 7.x. Collects rootdevice health (CPU, memory, temperature, uptime),
  storage topology (pools, volumes, disks), pervolume IO, and iSCSI LUN inventory. Uses discrete perentity storage API endpoints
  (SYNO.Core.Storage.) matching the knownvalid reference build. Designed for DS1520 but applicable to any adminaccessible
  DSM 7 unit.
source:
  port: 5001
  ssl: NO_VERIFY
  base_path: webapi
  timeout: 30
  max_retries: 2
  max_concurrent: 15
  auth:
    preset: cookie_session
    credentials:
    - key: username
      label: username
      sensitive: false
    - key: passwd
      label: passwd
      sensitive: true
    login:
      method: GET
      path: auth.cgi
      params:
      - key: api
        value: SYNO.API.Auth
      - key: version
        value: '3'
      - key: method
        value: login
      - key: account
        value: ${credentials.username}
      - key: passwd
        value: ${credentials.passwd}
      - key: session
        value: FileStation
      - key: format
        value: cookie
    extract:
      location: HEADER
      name: Set-Cookie
      bind_to: session.set_cookie
    inject:
    - type: header
      name: id
      value: ${session.set_cookie}
    logout:
      method: DELETE
      path: auth.cgi
      params:
      - key: method
        value: logout
      - key: version
        value: '3'
      - key: api
        value: SYNO.API.Auth
  test_request:
    method: GET
    path: entry.cgi
    params:
    - key: api
      value: SYNO.FileStation.Info
    - key: method
      value: get
    - key: version
      value: '2'
requests:
- name: utilization
  method: GET
  path: entry.cgi
  params:
  - key: api
    value: SYNO.Core.System.Utilization
  - key: version
    value: '1'
  - key: method
    value: get
  response_path: data
- name: get_volumes
  method: GET
  path: entry.cgi
  params:
  - key: version
    value: '1'
  - key: method
    value: list
  - key: location
    value: internal
  - key: offset
    value: '0'
  - key: limit
    value: '-1'
  - key: api
    value: SYNO.Core.Storage.Volume
  response_path: data
- name: storage_info
  method: GET
  path: entry.cgi
  params:
  - key: api
    value: SYNO.Core.System
  - key: type
    value: storage
  - key: method
    value: info
  - key: version
    value: '1'
  response_path: data
- name: luns
  method: GET
  path: entry.cgi
  params:
  - key: api
    value: SYNO.Core.ISCSI.LUN
  - key: version
    value: '1'
  - key: method
    value: list
  response_path: data
- name: filestation
  method: GET
  path: entry.cgi
  params:
  - key: api
    value: SYNO.FileStation.Info
  - key: version
    value: '1'
  - key: method
    value: get
  response_path: data
- name: get_disks
  method: GET
  path: entry.cgi
  params:
  - key: api
    value: SYNO.Core.Storage.Disk
  - key: method
    value: list
  - key: version
    value: '1'
  - key: location
    value: internal
  - key: limit
    value: '-1'
  - key: offset
    value: '0'
  response_path: data
- name: volume_util
  method: GET
  path: entry.cgi
  params:
  - key: api
    value: SYNO.Core.System.Utilization
  - key: version
    value: '1'
  - key: method
    value: get
  - key: location
    value: ${chain.volume_id}
  response_path: data
- name: system
  method: GET
  path: entry.cgi
  params:
  - key: api
    value: SYNO.Core.System
  - key: version
    value: '3'
  - key: method
    value: info
  response_path: data
- name: get_storage_pools
  method: GET
  path: entry.cgi
  params:
  - key: api
    value: SYNO.Core.Storage.Pool
  - key: method
    value: list
  - key: limit
    value: '-1'
  - key: offset
    value: '0'
  - key: version
    value: '1'
  response_path: data
- name: network_info
  method: GET
  path: entry.cgi
  params:
  - key: api
    value: SYNO.Core.System
  - key: type
    value: network
  - key: version
    value: '1'
  - key: method
    value: info
  response_path: data
object_types:
- name: Storage Pool
  key: storage_pool
  type: INTERNAL
  icon: data-cluster.svg
  identifiers:
  - id
  - pool_path
  name_expression: id
  metricSets:
  - from_request: get_storage_pools
    primary: true
    list_path: pools
  metrics:
  - key: device_type
    label: Device Type
    usage: PROPERTY
    type: STRING
    source: metricset:get_storage_pools.device_type
  - key: id
    label: ID
    usage: PROPERTY
    type: STRING
    source: metricset:get_storage_pools.id
  - key: num_id
    label: Num ID
    usage: PROPERTY
    type: NUMBER
    source: metricset:get_storage_pools.num_id
  - key: pool_path
    label: Pool Path
    usage: PROPERTY
    type: STRING
    source: metricset:get_storage_pools.pool_path
  - key: total
    label: Total
    usage: METRIC
    type: NUMBER
    source: metricset:get_storage_pools.size.total
  - key: used
    label: Used
    usage: METRIC
    type: NUMBER
    source: metricset:get_storage_pools.size.used
