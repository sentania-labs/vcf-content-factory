id: 5520e45f-bd5f-4943-85bd-6142d23dadb7
name: "[VCF Content Factory] Test - SM Enable Verification"
description: >
  Minimal test dashboard for verifying framework sync and super metric
  enable through the content-zip path. Pick a cluster on the left to
  see its VMs with CPU and memory metrics. Safe to delete after testing.

widgets:
  - id: cluster_picker
    type: ResourceList
    title: "Select a Cluster"
    coords: {x: 1, y: 1, w: 4, h: 11}
    resource_kinds:
      - {adapter_kind: VMWARE, resource_kind: ClusterComputeResource}

  - id: vm_perf_view
    type: View
    title: "VM CPU & Memory Performance"
    coords: {x: 5, y: 1, w: 8, h: 11}
    view: "[VCF Content Factory] VM Performance List"

  - id: cluster_avg_mem_scoreboard
    type: Scoreboard
    title: "Cluster Avg VM Memory Usage (%)"
    coords: {x: 1, y: 12, w: 12, h: 4}
    metrics:
      - adapter_kind: VMWARE
        resource_kind: ClusterComputeResource
        metric_key: "Super Metric|sm_627cda62-e3bb-4106-8e33-980bc9dfe1d1"
        metric_name: "Avg VM Memory Usage (%)"
        unit: "%"
        label: "Avg VM Mem %"
    show_resource_name: true
    show_metric_name: true
    show_metric_unit: true

interactions:
  - from: cluster_picker
    to: vm_perf_view
    type: resourceId
  - from: cluster_picker
    to: cluster_avg_mem_scoreboard
    type: resourceId
