id: d3740126-15c2-4e4d-8fa1-0728399a68d7
name: "[VCF Content Factory] VM Performance by vCenter"
description: >
  Pick a vCenter from the list on the left to see its virtual machines
  with key CPU and memory performance metrics. Demonstrates the
  ResourceList -> View widget interaction (resourceId) pattern.

widgets:
  - id: vcenter_picker
    type: ResourceList
    title: "Select a vCenter"
    coords: {x: 1, y: 1, w: 4, h: 11}
    resource_kinds:
      - {adapter_kind: VMWARE, resource_kind: VMwareAdapter Instance}

  - id: vm_perf_view
    type: View
    title: "VM CPU & Memory Performance"
    coords: {x: 5, y: 1, w: 8, h: 11}
    view: "[VCF Content Factory] VM Performance List"

interactions:
  - from: vcenter_picker
    to: vm_perf_view
    type: resourceId
