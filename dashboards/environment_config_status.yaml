id: 3b8e1c47-f902-4d71-ae85-62d0a9f7c314
name: "[VCF Content Factory] Environment Configuration Status"
description: >
  VP-level environment configuration and capacity status dashboard. Three
  sections: capacity headroom overview with post-HA adjusted KPIs and
  cluster-level detail; ESXi patch and version consistency across the host
  fleet; hardware and BIOS firmware configuration inventory. Designed for
  quarterly reviews and executive reporting. All data is self-provided (no
  picker required) — shows the entire vSphere environment.

widgets:

  # ── SECTION 1: Capacity Overview ─────────────────────────────────────────

  - id: overview_header
    type: TextDisplay
    title: "Environment Overview"
    coords: {x: 1, y: 1, w: 12, h: 2}
    html: >
      <p>This dashboard provides a VP-level view of configuration and capacity
      status across the vSphere environment. It covers three areas: overall
      capacity headroom with post-HA adjusted figures, ESXi patch and version
      consistency across the host fleet, and hardware and BIOS firmware
      inventory. Cell colors highlight items needing attention —
      <span style="color:#74B43B">green</span> (healthy),
      <span style="color:#ECC33E">yellow</span> (watch),
      <span style="color:#E07720">orange</span> (warning), and
      <span style="color:#DE3F30">red</span> (critical). Use this dashboard
      for quarterly reviews and executive reporting.</p>

  - id: env_kpis
    type: Scoreboard
    title: "Environment capacity KPIs"
    coords: {x: 1, y: 3, w: 12, h: 3}
    self_provider: true
    pin:
      adapter_kind: VMWARE
      resource_kind: vSphere World
    visual_theme: 8
    box_columns: 4
    metrics:
      - adapter_kind: VMWARE
        resource_kind: vSphere World
        metric_key: "summary|number_running_hosts"
        metric_name: "Running Hosts (env total)"
        color_method: 1
        label: "Running Hosts"

      - adapter_kind: VMWARE
        resource_kind: vSphere World
        metric_key: "summary|number_running_vms"
        metric_name: "Powered-On VMs"
        color_method: 1
        label: "Powered-On VMs"

      - adapter_kind: VMWARE
        resource_kind: ClusterComputeResource
        metric_key: "Super Metric|sm_43cf883b-12e4-4ecf-b1a8-bf36f20f093e"
        metric_name: "Avg Cluster CPU Free % (post-HA)"
        color_method: 0
        yellow_bound: 50
        orange_bound: 30
        red_bound: 15
        label: "Avg CPU Free % (post-HA)"

      - adapter_kind: VMWARE
        resource_kind: ClusterComputeResource
        metric_key: "Super Metric|sm_66cfa55c-dd8c-4cb4-a10c-ee2b4d2fb16e"
        metric_name: "Avg Cluster Mem Free % (post-HA)"
        color_method: 0
        yellow_bound: 50
        orange_bound: 30
        red_bound: 15
        label: "Avg Mem Free % (post-HA)"

  - id: capacity_view
    type: View
    title: "Cluster Capacity Overview (post-HA)"
    coords: {x: 1, y: 6, w: 12, h: 9}
    view: "[VCF Content Factory] Cluster Capacity Overview"
    self_provider: true
    pin:
      adapter_kind: VMWARE
      resource_kind: vSphere World

  # ── SECTION 2: ESXi Patch & Version Status ───────────────────────────────

  - id: versions_header
    type: TextDisplay
    title: "ESXi Patch & Version Status"
    coords: {x: 1, y: 15, w: 12, h: 2}
    html: >
      <p>All hosts within a cluster should run the same ESXi build number.
      Mixed build numbers indicate incomplete patching cycles — some hosts
      were updated while others were not. Sort by the <strong>Cluster</strong>
      column to quickly spot inconsistencies within a cluster. Hosts on
      different build numbers than their peers may represent a compliance or
      stability risk and should be scheduled for patching at the next
      maintenance window.</p>

  - id: esxi_versions_view
    type: View
    title: "Host ESXi Versions"
    coords: {x: 1, y: 17, w: 12, h: 9}
    view: "[VCF Content Factory] Host ESXi Versions"
    self_provider: true
    pin:
      adapter_kind: VMWARE
      resource_kind: vSphere World

  # ── SECTION 3: Hardware & BIOS Configuration ─────────────────────────────

  - id: hardware_header
    type: TextDisplay
    title: "Hardware & BIOS Configuration"
    coords: {x: 1, y: 26, w: 12, h: 2}
    html: >
      <p>This section shows hardware vendor, CPU model, and BIOS firmware
      versions across the host fleet. Inconsistent BIOS versions within the
      same hardware model may indicate missed firmware updates and can
      introduce subtle compatibility differences between hosts in the same
      cluster. Use this table to identify hosts that require firmware
      remediation or to verify that a firmware update campaign has been
      applied uniformly.</p>

  - id: hardware_config_view
    type: View
    title: "Host Hardware Configuration"
    coords: {x: 1, y: 28, w: 12, h: 9}
    view: "[VCF Content Factory] Host Hardware Configuration"
    self_provider: true
    pin:
      adapter_kind: VMWARE
      resource_kind: vSphere World
