description: 'Demand-driven capacity planning v2. Combines percentage-first cluster
  metrics, usable-vs-provisioned CPU comparison, contention heatmaps for visual scanning,
  and detailed host outlier + vSAN contribution tables from v1. Narrow scope picker
  (w=2) with wide cluster overview beside it. Select a cluster row to drill into VM
  contention, host outliers, and per-host vSAN performance. Two interaction tiers:
  broad visual scanning (heatmaps) at DC level, then drill-down detail (tables) at
  cluster level.

  '
id: be78532e-5cde-4cb9-8eb3-6b9e16b18c73
interactions:
- from: scope_picker
  to: cluster_overview
  type: resourceId
- from: scope_picker
  to: vm_heatmap
  type: resourceId
- from: scope_picker
  to: host_heatmap
  type: resourceId
- from: cluster_overview
  to: host_outliers
  type: resourceId
- from: cluster_overview
  to: vm_contention
  type: resourceId
- from: cluster_overview
  to: host_vsan
  type: resourceId
name: '[VCF Content Factory] Demand-Driven Capacity Planning v2'
released: true
widgets:
- coords:
    h: 8
    w: 2
    x: 1
    y: 1
  id: scope_picker
  resource_kinds:
  - adapter_kind: VMWARE
    resource_kind: VMwareAdapter Instance
  - adapter_kind: VMWARE
    resource_kind: Datacenter
  - adapter_kind: VMWARE
    resource_kind: vSphere World
  title: Select vCenter or Datacenter
  type: ResourceList
- coords:
    h: 8
    w: 7
    x: 3
    y: 1
  id: cluster_overview
  title: Cluster Demand & Capacity Overview
  type: View
  view: '[VCF Content Factory] Cluster Demand & Capacity Overview v2'
- coords:
    h: 8
    w: 3
    x: 10
    y: 1
  html: '<p><strong>Provisioned CPU (GHz)</strong> — total vCPU capacity

    allocated across all VMs in the cluster, expressed in GHz. This is what

    you have promised to workloads, not what they are consuming right now.</p>

    <p><strong>Usable CPU (GHz)</strong> — total cluster CPU after the HA

    reservation is set aside. This is the capacity vSphere will actually

    admit; the remaining headroom is held back for failover.</p>

    <p><strong>CPU Demand %</strong> — active demand from running VMs as a

    fraction of usable capacity. Elevated demand is expected during business

    hours; sustained high demand combined with rising contention is the

    signal to act.</p>

    '
  id: overview_explainer
  title: About these metrics
  type: TextDisplay
- configs:
  - adapter_kind: VMWARE
    color:
      min_value: 0
      thresholds:
        colors:
        - '#74B43B'
        - '#ECC33E'
        - '#F5A623'
        - '#DE3F30'
        values:
        - 0
        - 5
        - 10
        - 20
    color_by:
      label: CPU Contention %
      metric_key: cpu|capacity_contentionPct
    focus_on_groups: true
    group_by:
      adapter_kind: VMWARE
      resource_kind: HostSystem
      text: Host System
    name: VM CPU Contention
    resource_kind: VirtualMachine
    size_by:
      label: CPU Demand %
      metric_key: cpu|demandPct
    solid_coloring: false
  coords:
