id: a0fa2bc6-5e83-450c-9e1a-afae6304300f
name: "[VCF Content Factory] Demand-Driven Capacity Planning"
description: >
  Demand-side counterpart to [VCF Content Factory] Capacity Assessment &
  Right-Sizing. Where that dashboard answers "how much headroom is left
  (allocation basis)?", this one answers "where is contention happening
  right now, and which clusters, hosts, and VMs are feeling it?". All
  metrics are demand- and contention-derived: CPU Ready, co-stop, balloon,
  swap, vSAN latency — not vCPU/vRAM ratios. Use alongside the allocation
  dashboard for a complete pre- and post-deployment capacity picture. Pick a
  Datacenter or vSphere World from the left, drill into a cluster row to
  surface the VMs and hosts driving demand pressure on that cluster.

widgets:

  # ── Row 1: Scope picker ───────────────────────────────────────────────────

  - id: scope_picker
    type: ResourceList
    title: "Select Datacenter or vSphere World"
    coords: {x: 1, y: 1, w: 12, h: 3}
    resource_kinds:
      - {adapter_kind: VMWARE, resource_kind: Datacenter}
      - {adapter_kind: VMWARE, resource_kind: vSphere World}

  # ── Row 2: Cluster demand overview ───────────────────────────────────────
  # Receives scope from scope_picker (resourceId).
  # Row-selection on this widget drives the three detail widgets below.
  # The renderer emits selectFirstRow=true so the first cluster row is
  # pre-selected on load; downstream widgets populate immediately.
  #
  # NOTE: The loader's View widget YAML surface does not expose a
  # sort-column directive — sort_by_dir controls direction only, and the
  # column is Ops-assigned at view-definition time. To sort by
  # "CPU Contention Avg (7d)" descending, set that column as the default
  # sort in the view YAML (views/cluster_demand_overview.yaml).

  - id: cluster_overview
    type: View
    title: "Cluster Demand Overview"
    coords: {x: 1, y: 4, w: 12, h: 9}
    view: "[VCF Content Factory] Cluster Demand Overview"

  # ── Row 3: VM pain (left) + Host outliers (right) ────────────────────────
  # Both receive resourceId from cluster_overview row-selection.

  - id: vm_pain
    type: View
    title: "VM Contention Pain"
    coords: {x: 1, y: 13, w: 6, h: 9}
    view: "[VCF Content Factory] VM Contention Pain"
    # NOTE: sort-column not settable via loader; to sort by
    # "CPU Ready P95 (24h)" descending, configure in the view YAML.

  - id: host_outliers
    type: View
    title: "Host Contention Outliers"
    coords: {x: 7, y: 13, w: 6, h: 9}
    view: "[VCF Content Factory] Host Contention Outliers"
    # NOTE: sort-column not settable via loader; to sort by
    # "VMs Facing CPU Ready (P95, 24h)" descending, configure in the view YAML.

  # ── Row 4: Per-host vSAN contribution ────────────────────────────────────
  # Receives resourceId from cluster_overview row-selection.

  - id: host_vsan
    type: View
    title: "Per-Host vSAN Contribution"
    coords: {x: 1, y: 22, w: 12, h: 9}
    view: "[VCF Content Factory] Per-Host vSAN Contribution"
    # NOTE: sort-column not settable via loader; to sort by
    # "vSAN Write Latency P95 (24h)" descending, configure in the view YAML.

interactions:
  - from: scope_picker
    to: cluster_overview
    type: resourceId
  - from: cluster_overview
    to: vm_pain
    type: resourceId
  - from: cluster_overview
    to: host_outliers
    type: resourceId
  - from: cluster_overview
    to: host_vsan
    type: resourceId
