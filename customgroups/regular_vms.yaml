name: "[AI Content] Regular VMs"
description: >
  All VirtualMachine objects that are ordinary workload VMs — not VKS workers,
  not Supervisor control-plane nodes, not vCLS agents, and not VM Service
  operator VMs. Selected by summary|config|type = default, which is the value
  vCenter reports for standard virtual machines and cleanly excludes all
  Supervisor-managed VM types. Property recon-verified on
  vcf-lab-wld01-vcenter 2026-04-08. One rule, one AND'd property condition.
  Note: the PowerCLI report's "Regular vCPU exclusion" bucket is intentionally
  omitted — this group's type=default filter achieves the same population
  boundary without a NOT clause. Group type VKS Workload Role is new on the
  instance and will be created by the sync loader before this group is upserted.
type: VKS Workload Role
auto_resolve_membership: true
rules:
  - resource_kind: VirtualMachine
    adapter_kind: VMWARE
    property:
      - { key: "summary|config|type", op: EQ, value: "default" }
