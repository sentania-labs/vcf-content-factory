name: "[AI Content] Shared VMFS Datastores"
description: >
  All Datastore objects whose summary|type is VMFS and whose
  summary|isLocal property is "false". Covers shared VMFS volumes
  presented over iSCSI or Fibre Channel (both protocols are bucketed
  together here — recon confirmed no property distinguishes FC from
  iSCSI at the Datastore level). Used as the upstream scope group for
  "[AI Content] VMs on Shared VMFS". Part of the "VM performance by
  datastore type" dashboard datastore partition.
type: Environment
auto_resolve_membership: true
rules:
  - resource_kind: Datastore
    adapter_kind: VMWARE
    property:
      - { key: "summary|type", op: EQ, value: "VMFS" }
      - { key: "summary|isLocal", op: EQ, value: "false" }
