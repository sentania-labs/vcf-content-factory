name: "[VCF Content Factory] Test - Powered-On VMs"
description: >
  Test custom group for distribution package validation. Contains
  all powered-on virtual machines. Safe to delete after testing.
type: Environment
auto_resolve_membership: true
rules:
  - resource_kind: VirtualMachine
    adapter_kind: VMWARE
    property:
      - { key: "summary|runtime|powerState", op: EQ, value: "Powered On" }
