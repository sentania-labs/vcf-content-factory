# Dell PowerEdge v5 — VCF Content Factory Management Pack
#
# Architecture:
#   v5 collapses the 8 intermediate collection-container object types from v4
#   (Power, Thermal, ProcessorsCollection, Memory Devices Collection,
#   Firmware Inventory Collection, System Ethernet Interface Collection,
#   DellNumericSensorCollection, CPU.1) and binds all 11 Redfish request
#   "base" listIds directly to the Dell PowerEdge Server singleton.
#   Fan-out component objects chain from the Server's primary metricSets.
#   MPB auto-emits Server->Component parent-child edges from the chaining graph.
#   No explicit relationships[] are required and none are declared.
#
# Object types (12 total):
#   1  Dell PowerEdge Server   — is_singleton; binds all 11 request base listIds
#   2  Processor               — list; fans out from processor_list.Members
#   3  Memory DIMM             — list; fans out from memory_inventory.Members
#   4  Network Interface       — list; fans out from nic_inventory.Members
#   5  Firmware Component      — list; fans out from firmware_inventory.Members
#   6  Physical Drive          — list; fans out from storage_controller_cpu1.Drives
#   7  Fan                     — list; fans out from thermal.Fans
#   8  Temperature Sensor      — list; fans out from thermal.Temperatures
#   9  Power Supply            — list; fans out from power.PowerSupplies
#   10 Power Control           — list; fans out from power.PowerControl
#   11 Dell OEM Sensor         — list; fans out from oem_numeric_sensors.Members
#
# Adapter identity:
#   adapter_kind: mpb_vcf_content_factory_dell_poweredge_v5
#   Separate from v4 (mpb_vcf_content_factory_dell_poweredge_v4) so both
#   versions can coexist on an instance during migration testing.
#
# Source: v4 design.json (tmp/dell_v4_export_source.json)
# Cleanup plan: orchestrator brief 2026-05-18

name: VCF Content Factory Dell PowerEdge v5
version: "2.0.0"
build_number: 1
author: VCF Content Factory
adapter_kind: mpb_vcf_content_factory_dell_poweredge_v5
description: >
  Dell PowerEdge hardware inventory via Redfish. Pulls system info, iDRAC info,
  Dell OEM telemetry, plus per-component metrics for processors, memory DIMMs,
  NICs, firmware components, drives, fans, temperature sensors, power supplies,
  power-control zones, and Dell OEM sensors. Each component is a child resource
  of the parent server; relationships are auto-emitted by MPB chaining (no
  post-install scripts). Each adapter instance manages one iDRAC endpoint.

source:
  port: 443
  ssl: NO_VERIFY
  base_path: ""
  timeout: 30
  max_retries: 2
  max_concurrent: 2
  auth:
    preset: basic_auth
    credentials:
      - {key: username, label: Username, sensitive: false}
      - {key: password, label: Password, sensitive: true}
    inject:
      - type: header
        name: Authorization
        value: "Basic ${authentication.basic}"
      - type: header
        name: Content-Type
        value: "application/json"
  test_request:
    method: GET
    path: "redfish/v1"
    params: []
  config_fields:
    - key: mpb_hostname
      label: Hostname
      type: STRING
      default: ""
      description: "The hostname used to connect to the target API."
    - key: mpb_port
      label: Port
      type: NUMBER
      default: "443"
      description: "The port used to connect to the target API."
    - key: mpb_connection_timeout
      label: Connection Timeout (s)
      type: NUMBER
      default: "30"
      description: "The maximum number of seconds to wait for a response from the endpoint."
    - key: mpb_concurrent_requests
      label: Maximum Concurrent Requests
      type: NUMBER
      default: "2"
      description: "The maximum number of request that can be run simultaneously."
    - key: mpb_max_retries
      label: Maximum Retries
      type: NUMBER
      default: "2"
      description: "The maximum number of times a call to an endpoint will be retried if it fails."
    - key: mpb_ssl_config
      label: SSL Configuration
      type: SINGLE_SELECTION
      default: "Verify"
      options: ["No Verify", "Verify", "No SSL"]
      description: >-
        The SSL mode to use when connecting to the target. Can be configured
        without SSL (No SSL), to use SSL but do not verify the target's
        certificate (No Verify), or to use SSL and verify the target's
        certificate (Verify).
    - key: mpb_min_event_severity
      label: Minimum VMware Aria Operations Severity
      type: SINGLE_SELECTION
      default: "Warning"
      options: ["Critical", "Immediate", "Warning", "Info"]
      description: "The minimum event severity to collect."

# -----------------------------------------------------------------------
# Requests — all 11 Redfish endpoints, unchanged from v4
# -----------------------------------------------------------------------
requests:
  # system_info: primary server identity + health summary
  - name: system_info
    method: GET
    path: "redfish/v1/Systems/System.Embedded.1"
    params: []

  # manager_info: iDRAC firmware and model
  - name: manager_info
    method: GET
    path: "redfish/v1/Managers/iDRAC.Embedded.1"
    params: []

  # oem_dell_system: Dell-specific OEM system telemetry and slot inventory
  - name: oem_dell_system
    method: GET
    path: "redfish/v1/Systems/System.Embedded.1/Oem/Dell/DellSystem/System.Embedded.1"
    params: []

  # thermal: Fans.* and Temperatures.* arrays + base Name scalar
  - name: thermal
    method: GET
    path: "redfish/v1/Chassis/System.Embedded.1/Thermal"
    params: []

  # power: PowerSupplies.* and PowerControl.* arrays + base Name scalar
  - name: power
    method: GET
    path: "redfish/v1/Chassis/System.Embedded.1/Power"
    params: []

  # processor_list: Members.* expanded processor objects
  - name: processor_list
    method: GET
    path: "redfish/v1/Systems/System.Embedded.1/Processors?$expand=.($levels=1)"
    params: []

  # memory_inventory: Members.* expanded DIMM objects
  - name: memory_inventory
    method: GET
    path: "redfish/v1/Systems/System.Embedded.1/Memory?$expand=.($levels=1)"
    params: []

  # nic_inventory: Members.* expanded Ethernet interface objects
  - name: nic_inventory
    method: GET
    path: "redfish/v1/Systems/System.Embedded.1/EthernetInterfaces?$expand=.($levels=1)"
    params: []

  # firmware_inventory: Members.* expanded firmware component objects
  - name: firmware_inventory
    method: GET
    path: "redfish/v1/UpdateService/FirmwareInventory?$expand=.($levels=1)"
    params: []

  # storage_controller_cpu1: Drives.* expanded physical drive objects
  # NOTE: "CPU.1" is the Redfish path artifact for the storage controller
  # endpoint, not a CPU object. Physical drives chain directly from the Server.
  - name: storage_controller_cpu1
    method: GET
    path: "redfish/v1/Systems/System.Embedded.1/Storage/CPU.1?$expand=.($levels=1)"
    params: []

  # oem_numeric_sensors: Members.* expanded Dell OEM sensor objects
  - name: oem_numeric_sensors
    method: GET
    path: "redfish/v1/Systems/System.Embedded.1/Oem/Dell/DellNumericSensors?$expand=."
    params: []

# -----------------------------------------------------------------------
# Object types
# -----------------------------------------------------------------------
object_types:

  # =====================================================================
  # 1. Dell PowerEdge Server — singleton (one per adapter instance)
  #    Binds all 11 request base listIds; serves as chaining anchor for
  #    all fan-out component objects.
  # =====================================================================
  - name: Dell PowerEdge Server
    key: dell_poweredge_server
    type: INTERNAL
    icon: host_system
    is_singleton: true
    identifiers:
      - key: serial_number
        source: "metricset:system_info.SerialNumber"
    name_expression: hostname
    metricSets:
      # Primary: system_info base — server identity and health summary
      - from_request: system_info
        list_path: ""
      # manager_info base — iDRAC firmware and model
      - from_request: manager_info
        list_path: ""
      # oem_dell_system base — Dell OEM slot inventory and health rollups
      - from_request: oem_dell_system
        list_path: ""
      # thermal base — binds thermal request so Fans/Temperatures can chain from it
      - from_request: thermal
        list_path: ""
      # power base — binds power request so PowerSupplies/PowerControl can chain from it
      - from_request: power
        list_path: ""
      # processor_list base — binds request so Processor can chain from it
      - from_request: processor_list
        list_path: ""
      # memory_inventory base — binds request so Memory DIMM can chain from it
      - from_request: memory_inventory
        list_path: ""
      # nic_inventory base — binds request so Network Interface can chain from it
      - from_request: nic_inventory
        list_path: ""
      # firmware_inventory base — binds request so Firmware Component can chain from it
      - from_request: firmware_inventory
        list_path: ""
      # storage_controller_cpu1 base — binds request so Physical Drive can chain from it
      - from_request: storage_controller_cpu1
        list_path: ""
      # oem_numeric_sensors base — binds request so Dell OEM Sensor can chain from it
      - from_request: oem_numeric_sensors
        list_path: ""
