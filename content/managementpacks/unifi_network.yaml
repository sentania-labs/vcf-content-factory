        coerce: number
        source: "metricset:dev_inventory.system-stats.cpu"

      - key: mem_pct
        label: "Memory %"
        usage: METRIC
        type: NUMBER
        coerce: number
        source: "metricset:dev_inventory.system-stats.mem"

      - key: client_count
        label: "Clients"
        usage: METRIC
        type: NUMBER
        source: "metricset:dev_inventory.num_sta"

      # --- Chassis-level ---
      - key: total_max_power_w
        label: "PoE Budget Max (W)"
        usage: METRIC
        type: NUMBER
        source: "metricset:dev_inventory.total_max_power"

      # --- Per-port aggregates (JMESPath length() predicates) ---
      - key: port_count
        label: "Port Count"
        usage: METRIC
        type: NUMBER
        source: "metricset:dev_inventory.port_table | length(@)"

      - key: ports_up_count
        label: "Ports Up"
        usage: METRIC
        type: NUMBER
        source: "metricset:dev_inventory.port_table[?up==`true`] | length(@)"

      - key: ports_poe_capable_count
        label: "PoE-Capable Ports"
        usage: METRIC
        type: NUMBER
        source: "metricset:dev_inventory.port_table[?port_poe==`true`] | length(@)"


  # ---------------------------------------------------------------------------
  # Gateway — list
  # Source: stat/device filtered by type=='udm' or type=='ugw'.
  # UDM Pro appears once here. Carries hardware metrics (CPU, mem, system load,
  # uptime), WAN link metrics (wan1/wan2), active-WAN speedtest (uplink), and
  # CPU temperature (temperatures[?name=='CPU']).
  # ---------------------------------------------------------------------------
  - name: "Gateway"
    key: gateway
    type: INTERNAL
    icon: "firewall.svg"
    is_singleton: false
    identifiers: [mac]
    name_expression: name

    metricSets:
      - from_request: dev_inventory
        primary: true
        list_path: "[?type=='udm' || type=='ugw']"

    metrics:
      # --- Device-level properties ---
      - key: mac
        label: "MAC"
        usage: PROPERTY
        type: STRING
        source: "metricset:dev_inventory.mac"

      - key: name
        label: "Name"
        usage: PROPERTY
        type: STRING
        source: "metricset:dev_inventory.name"

      - key: hostname
        label: "Hostname"
        usage: PROPERTY
        type: STRING
        source: "metricset:dev_inventory.hostname"

      - key: model
        label: "Model"
        usage: PROPERTY
        type: STRING
        source: "metricset:dev_inventory.model"

      - key: model_in_lts
        label: "Model In LTS"
        usage: PROPERTY
        type: STRING
        source: "metricset:dev_inventory.model_in_lts"

      - key: device_type
        label: "Device Type"
        usage: PROPERTY
        type: STRING
        source: "metricset:dev_inventory.type"

      - key: firmware_version
        label: "Firmware Version"
        usage: PROPERTY
        type: STRING
        source: "metricset:dev_inventory.version"

      - key: unifi_os_version
        label: "UniFi OS Version"
        usage: PROPERTY
        type: STRING
        source: "metricset:dev_inventory.console_display_version"

      - key: udm_version
        label: "UDM Firmware Version"
        usage: PROPERTY
        type: STRING
        source: "metricset:dev_inventory.udm_version"

      - key: serial
        label: "Serial"
        usage: PROPERTY
        type: STRING
        source: "metricset:dev_inventory.serial"

      - key: ip
        label: "IP Address"
        usage: PROPERTY
        type: STRING
        source: "metricset:dev_inventory.ip"

      - key: overheating
        label: "Overheating"
        usage: PROPERTY
        type: STRING
        source: "metricset:dev_inventory.overheating"

      - key: wan1_up
        label: "WAN1 Link Up"
        usage: PROPERTY
        type: STRING
        source: "metricset:dev_inventory.wan1.up"

      - key: active_wan_speedtest_status
        label: "Active WAN Speedtest Status"
        usage: PROPERTY
        type: STRING
        source: "metricset:dev_inventory.uplink.speedtest_status"

      # --- Device-level metrics ---
      - key: state
        label: "State"
        usage: METRIC
        type: NUMBER
        source: "metricset:dev_inventory.state"

      - key: uptime_seconds
        label: "Uptime (s)"
        usage: METRIC
        type: NUMBER
        source: "metricset:dev_inventory._uptime"

      - key: last_seen_epoch
        label: "Last Seen"
        usage: METRIC
        type: NUMBER
        source: "metricset:dev_inventory.last_seen"

      - key: cpu_pct
        label: "CPU %"
        usage: METRIC
        type: NUMBER
        coerce: number
        source: "metricset:dev_inventory.system-stats.cpu"

      - key: mem_pct
        label: "Memory %"
        usage: METRIC
        type: NUMBER
        coerce: number
        source: "metricset:dev_inventory.system-stats.mem"

      - key: system_load_1m
        label: "System Load (1m)"
        usage: METRIC
        type: NUMBER
        source: "metricset:dev_inventory.system-stats.loadavg_1"

      - key: system_load_5m
        label: "System Load (5m)"
        usage: METRIC
        type: NUMBER
        source: "metricset:dev_inventory.system-stats.loadavg_5"

      - key: system_load_15m
        label: "System Load (15m)"
        usage: METRIC
        type: NUMBER
        source: "metricset:dev_inventory.system-stats.loadavg_15"

      - key: client_count
        label: "Clients"
        usage: METRIC
        type: NUMBER
        source: "metricset:dev_inventory.num_sta"

      # --- WAN1 metrics ---
      - key: wan1_tx_bytes_total
        label: "WAN1 TX Bytes (cumulative)"
        usage: METRIC
        type: NUMBER
        source: "metricset:dev_inventory.wan1.tx_bytes"

      - key: wan1_rx_bytes_total
        label: "WAN1 RX Bytes (cumulative)"
        usage: METRIC
        type: NUMBER
        source: "metricset:dev_inventory.wan1.rx_bytes"

      - key: wan1_tx_bytes_rate
        label: "WAN1 TX Bytes/s"
        usage: METRIC
        type: NUMBER
        source: "metricset:dev_inventory.wan1.tx_bytes-r"

      - key: wan1_rx_bytes_rate
        label: "WAN1 RX Bytes/s"
        usage: METRIC
        type: NUMBER
        source: "metricset:dev_inventory.wan1.rx_bytes-r"

      - key: wan1_tx_errors
        label: "WAN1 TX Errors"
        usage: METRIC
        type: NUMBER
        source: "metricset:dev_inventory.wan1.tx_errors"

      - key: wan1_rx_errors
        label: "WAN1 RX Errors"
        usage: METRIC
        type: NUMBER
        source: "metricset:dev_inventory.wan1.rx_errors"

      - key: wan1_latency_ms
        label: "WAN1 Latency (ms)"
        usage: METRIC
        type: NUMBER
        source: "metricset:dev_inventory.wan1.latency"

      - key: wan1_availability_pct
        label: "WAN1 Availability %"
        usage: METRIC
        type: NUMBER
        source: "metricset:dev_inventory.wan1.availability"

      - key: wan1_speed_mbps
        label: "WAN1 Speed (Mbps)"
        usage: METRIC
        type: NUMBER
        source: "metricset:dev_inventory.wan1.speed"

      # --- WAN2 metrics (mirrors WAN1, only present when WAN2 link exists) ---
      - key: wan2_tx_bytes_total
        label: "WAN2 TX Bytes (cumulative)"
        usage: METRIC
        type: NUMBER
        source: "metricset:dev_inventory.wan2.tx_bytes"

      - key: wan2_rx_bytes_total
        label: "WAN2 RX Bytes (cumulative)"
        usage: METRIC
        type: NUMBER
        source: "metricset:dev_inventory.wan2.rx_bytes"

      - key: wan2_tx_bytes_rate
        label: "WAN2 TX Bytes/s"
        usage: METRIC
        type: NUMBER
        source: "metricset:dev_inventory.wan2.tx_bytes-r"

      - key: wan2_rx_bytes_rate
        label: "WAN2 RX Bytes/s"
        usage: METRIC
        type: NUMBER
        source: "metricset:dev_inventory.wan2.rx_bytes-r"

      - key: wan2_tx_errors
        label: "WAN2 TX Errors"
        usage: METRIC
        type: NUMBER
        source: "metricset:dev_inventory.wan2.tx_errors"

      - key: wan2_rx_errors
        label: "WAN2 RX Errors"
        usage: METRIC
        type: NUMBER
        source: "metricset:dev_inventory.wan2.rx_errors"

      - key: wan2_latency_ms
        label: "WAN2 Latency (ms)"
        usage: METRIC
        type: NUMBER
        source: "metricset:dev_inventory.wan2.latency"

      - key: wan2_availability_pct
        label: "WAN2 Availability %"
        usage: METRIC
        type: NUMBER
        source: "metricset:dev_inventory.wan2.availability"

      - key: wan2_speed_mbps
        label: "WAN2 Speed (Mbps)"
        usage: METRIC
        type: NUMBER
        source: "metricset:dev_inventory.wan2.speed"

      # --- Active WAN speedtest (from uplink top-level object) ---
      - key: active_wan_xput_up
        label: "Active WAN Speedtest Up"
        usage: METRIC
        type: NUMBER
        source: "metricset:dev_inventory.uplink.xput_up"

      - key: active_wan_xput_down
        label: "Active WAN Speedtest Down"
        usage: METRIC
        type: NUMBER
        source: "metricset:dev_inventory.uplink.xput_down"

      - key: active_wan_speedtest_ping_ms
        label: "Active WAN Ping (ms)"
        usage: METRIC
        type: NUMBER
        source: "metricset:dev_inventory.uplink.speedtest_ping"

      - key: active_wan_drops
        label: "Active WAN Drops"
        usage: METRIC
        type: NUMBER
        source: "metricset:dev_inventory.uplink.drops"

      - key: active_wan_uptime
        label: "Active WAN Path Uptime"
        usage: METRIC
        type: NUMBER
        source: "metricset:dev_inventory.uplink.uptime"

      # --- Temperatures (UDM only — absent on USG-split deployments) ---
      # API map confirms temperatures[] is array-of-objects {name, type, value}.
      # Sensor names on UDM Pro: "CPU", "Local" (board), "PHY" (board).
      # v1's [?name=='System'] filter does NOT match — corrected to [?name=='CPU'].
      - key: cpu_temp_c
        label: "CPU Temperature (°C)"
        usage: METRIC
        type: NUMBER
        source: "metricset:dev_inventory.temperatures[?name=='CPU'].value | [0]"


# No explicit relationships in v2. AP, Switch, Gateway, and UniFi Site all
# parent the adapter instance implicitly via MPB's default containment model.
# v1.1 adds: AP→Switch and Switch→Switch via uplink.uplink_mac field_match joins.
relationships: []
