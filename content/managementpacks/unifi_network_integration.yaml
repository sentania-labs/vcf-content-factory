  parent_expression: device_id
  scope: field_match
released: false
requests:
- method: GET
  name: sites
  params: []
  path: /proxy/network/integration/v1/sites
  response_path: data
- method: GET
  name: devices_ap
  params:
  - key: filter
    value: features.contains('accessPoint')
  path: /proxy/network/integration/v1/sites/${chain.site_id}/devices
  response_path: data
- method: GET
  name: devices_switch
  params:
  - key: filter
    value: and(features.contains('switching'),not(features.contains('accessPoint')),model.notIn('UDM
      Pro','UDM SE','UDM','UDM Pro Max','UXG Pro','UXG Lite','UXG Max'))
  path: /proxy/network/integration/v1/sites/${chain.site_id}/devices
  response_path: data
- method: GET
  name: devices_gateway
  params:
  - key: filter
    value: model.in('UDM Pro','UDM SE','UDM','UDM Pro Max','UXG Pro','UXG Lite','UXG
      Max')
  path: /proxy/network/integration/v1/sites/${chain.site_id}/devices
  response_path: data
- method: GET
  name: device_stats_ap
  params: []
  path: /proxy/network/integration/v1/sites/${chain.site_id}/devices/${chain.device_id}/statistics/latest
  response_path: ''
- method: GET
  name: device_stats_switch
  params: []
  path: /proxy/network/integration/v1/sites/${chain.site_id}/devices/${chain.device_id}/statistics/latest
  response_path: ''
- method: GET
  name: device_stats_gateway
  params: []
  path: /proxy/network/integration/v1/sites/${chain.site_id}/devices/${chain.device_id}/statistics/latest
  response_path: ''
- method: GET
  name: device_detail_ap
  params: []
  path: /proxy/network/integration/v1/sites/${chain.site_id}/devices/${chain.device_id}
  response_path: ''
- method: GET
  name: device_detail_switch
  params: []
  path: /proxy/network/integration/v1/sites/${chain.site_id}/devices/${chain.device_id}
  response_path: ''
- method: GET
  name: device_detail_gateway
  params: []
  path: /proxy/network/integration/v1/sites/${chain.site_id}/devices/${chain.device_id}
  response_path: ''
- method: GET
  name: clients
  params:
  - key: limit
    value: '200'
  path: /proxy/network/integration/v1/sites/${chain.site_id}/clients
  response_path: data
- method: GET
  name: networks
  params: []
  path: /proxy/network/integration/v1/sites/${chain.site_id}/networks
  response_path: data
source:
  auth:
    credentials:
    - key: api_key
      label: api_key
      sensitive: true
    inject:
    - name: X-API-Key
      type: header
      value: ${credentials.api_key}
    preset: http_header
  base_path: ''
  max_concurrent: 10
  max_retries: 2
  port: 443
  ssl: NO_VERIFY
  test_request:
    method: GET
    params: []
    path: /proxy/network/integration/v1/info
  timeout: 30
version: 1.0.0
