# Deferred: per-radio metrics (2.4 GHz / 5 GHz tx_retries, channel, tx_power)
# pending MPB grammar support for predicate extraction.
# Authority: context/mp_authoring_design_principles.md §"Case Study 1"
# Authority: context/known_limitations.md §"MPB <9.2 runtime: no JMESPath filter projections"
# Re-add as a separate Radio resource kind (matching UniFi's existing
# kind-per-concept pattern) when grammar support lands.
adapter_kind: mpb_vcf_content_factory_unifi_integration
author: VCF Content Factory
build_number: 14
description: 'Monitors UniFi network devices via the Integration API v1. Collects
  device health (CPU, memory, uptime, load averages, uplink throughput) and inventory
  properties for Access Points, Switches, and the Gateway (UDM Pro). Enriches each
  device with per-device detail properties (adoption/provisioning timestamps,
  configuration ID, uplink device ID). Includes Client and Network object types for
  a full inventory view. Topology relationships wire devices to their uplink parent
  (gateway→switch→AP) and clients to their connected device. Uses stateless X-API-Key
  auth (no login/logout session). Requires UniFi Network Application 10.1.84+ with
  Integration API enabled.

  '
name: VCF Content Factory UniFi Integration
