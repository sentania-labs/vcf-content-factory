relationships:
- child: access_point
  child_expression: uplink_device_id
  parent: switch
  parent_expression: device_id
  scope: field_match
- child: switch
  child_expression: uplink_device_id
  parent: gateway
  parent_expression: device_id
  scope: field_match
- child: access_point
  child_expression: uplink_device_id
  parent: gateway
  parent_expression: device_id
  scope: field_match
- child: client
  child_expression: uplink_device_id
  parent: access_point
  parent_expression: device_id
