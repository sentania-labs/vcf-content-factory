description: 'Single-dashboard capacity review for a VCF Ops admin. Top section shows
  environment-wide capacity headroom at cluster granularity with post-HA adjustments,
  days-until-runout projections from VCF Ops capacity analytics, and ''how many more
  VMs fit'' counts. Bottom section identifies right-sizing opportunities — VMs VCF
  Ops''s capacity engine has flagged as oversized, undersized, or idle, with 95th-percentile
  demand justification columns and explicit current-to-target resize recommendations.
  Colors follow the standard three-band stoplight throughout. Use for quarterly capacity
  reviews and before any cluster-scale VM deployment.

  '
id: 46f75705-4da9-4fb9-b2d6-9569ce628790
name: '[VCF Content Factory] Capacity Assessment & Right-Sizing'
released: true
widgets:
- coords:
    h: 2
    w: 12
    x: 1
    y: 1
  html: '<p>This section answers three questions about your vSphere environment using
    <strong>post-HA adjusted figures</strong> — the capacity vSphere will actually
    admit, not raw totals. First: how many more VMs fit before a cluster reaches its
    post-HA limit? Second: how fast is headroom shrinking — days until runout? Third:
    which clusters are already tight and should be prioritised for expansion or workload
    migration? Cells color <span style="color:#74B43B">green</span> (healthy), <span
    style="color:#ECC33E">yellow</span> (watch), <span style="color:#E07720">orange</span>
    (warning), or <span style="color:#DE3F30">red</span> (critical) to highlight at-risk
    clusters at a glance.</p>

    '
