- coords:
    h: 2
    w: 12
    x: 1
    y: 22
  html: '<p>VCF Ops capacity engine flags every VM into one of three categories: <strong>Oversized</strong>
    — allocated resources consistently exceed demand, reclaim vCPUs and memory to
    free capacity; <strong>Undersized</strong> — demand regularly exceeds allocation,
    a performance risk requiring additional resources; or <strong>Idle</strong> —
    negligible activity sustained over the analysis window, a candidate for retirement
    or consolidation. The table below lists all flagged VMs with flag columns colored
    red when triggered and 95th-percentile demand justification columns colored on
    the same green/yellow/orange/red three-band scheme used in the capacity section
    above.</p>

    '
