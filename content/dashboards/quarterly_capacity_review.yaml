  html: '<p><strong>Quarterly Capacity Review</strong></p> <p>Select a scope at left
    — vSphere World for the full environment, a Datacenter for a specific site, or
    a Cluster for detail.</p> <p>Statistics reflect a <strong>90-day window</strong>.
    <strong>P95</strong> values give a conservative demand picture — use these, not
    averages, for growth projections and expansion justification.</p>

    '
