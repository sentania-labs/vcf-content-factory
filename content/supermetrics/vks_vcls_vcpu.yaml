id: 020cf289-b254-4d8c-9e36-f0925c36e3d8
name: "[VCF Content Factory] vCLS vCPU (count)"
resource_kinds:
  - resource_kind_key: ClusterComputeResource
    adapter_kind_key: VMWARE
  - resource_kind_key: Datacenter
    adapter_kind_key: VMWARE
  - resource_kind_key: VMwareAdapter Instance
    adapter_kind_key: VMWARE
description: >
  Sum of provisioned vCPUs across all vSphere Clustering Service (vCLS) VMs
  within the assigned object's scope. vCLS VMs reside in a folder named "vCLS"
  and are identified by summary|parentFolder equals vCLS. These VMs are
  VMware-managed and consume cluster capacity independent of workloads.

  Assigned to ClusterComputeResource, Datacenter, and VMwareAdapter Instance
  so a single formula yields per-cluster, per-DC, and per-vCenter rollups.
formula: |
  sum(${adaptertype=VMWARE, objecttype=VirtualMachine,
        metric=config|hardware|num_Cpu, depth=10,
        where="summary|parentFolder equals vCLS"})
