id: dd8a6df8-7454-4b8e-a6fe-65a662f9cbd4
name: "[VCF Content Factory] VKS Node Image vCPU (count)"
resource_kinds:
  - resource_kind_key: ClusterComputeResource
    adapter_kind_key: VMWARE
  - resource_kind_key: Datacenter
    adapter_kind_key: VMWARE
  - resource_kind_key: VMwareAdapter Instance
    adapter_kind_key: VMWARE
description: >
  Sum of provisioned vCPUs across all VKS node image VMs within the assigned
  object's scope — both cluster control plane VMs and worker node VMs. Filter
  uses summary|config|productName contains "Kubernetes" for cross-version
  compatibility: v9 (VCF 9.0) sets productName="vSphere Kubernetes Service
  Cluster Node Image"; v8 (VCF 5.2 / Aria Ops 8.18) sets productName="Tanzu
  Kubernetes Grid Service - Tanzu Kubernetes cluster Image". Both contain
  "Kubernetes"; no other product names on either instance match. Recon
  confirmed this on both v9 prod and v8 lab instances.

  Single-condition string where clauses are the supported pattern; compound
  && with string operators silently fail in the VCF Ops engine. The
  CP/worker breakdown SMs (vks_cp_vcpu, vks_worker_vcpu) have been removed
  as the worker node marker is not reliably cross-version. This SM and the
  Supervisor SM (vks_supervisor_vcpu) together cover the VKS footprint
  without needing further decomposition.

  Assigned to ClusterComputeResource, Datacenter, and VMwareAdapter Instance
  so a single formula yields per-cluster, per-DC, and per-vCenter rollups
  without duplication.
formula: |
  sum(${adaptertype=VMWARE, objecttype=VirtualMachine,
        metric=config|hardware|num_Cpu, depth=10,
        where="summary|config|productName contains Kubernetes"})
