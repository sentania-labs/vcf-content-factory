name: "[VCF Content Factory] Synology System Temperature Critical"
# TODO: verify resource kind prefix at install-verification time
# (MPB may expose this as mpb_synology_dsm_synology_diskstation rather than synology_diskstation)
adapter_kind: mpb_synology_dsm
resource_kind: synology_diskstation
severity: CRITICAL
wait_cycles: 3
cancel_cycles: 3

condition:
  type: metric_static
  key: sys_temp
  operator: GT
  value: 70
  instanced: false

description: >
  Triggers when the DiskStation system temperature exceeds 70 degrees Celsius.
  At this level thermal throttling is likely active and hardware damage is
  possible. Check airflow, fans, and ambient rack temperature immediately.
  Sourced from SYNO.DSM.Info temperature field (unit: C). Companion to the
  WARNING symptom at 60C.
