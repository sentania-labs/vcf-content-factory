id: d463820e-403e-488e-974e-27b292a6a701
name: "[VCF Content Factory] Cluster - Undersized VM Count"
resource_kinds:
  - resource_kind_key: ClusterComputeResource
    adapter_kind_key: VMWARE
description: >
  Count of VMs under this cluster that VCF Ops's capacity engine has flagged as
  undersized (summary|undersized == 1). A high count indicates performance risk —
  each flagged VM has insufficient vCPU or memory allocation for its observed demand
  per the companion summary|undersized|vcpus and summary|undersized|memory metrics.
  Pair with the Oversized count as the two halves of the right-sizing story:
  oversized = reclaim, undersized = invest. depth=2 walks from ClusterComputeResource
  through HostSystem to VirtualMachine.
formula: |
  count(${adaptertype=VMWARE, objecttype=VirtualMachine,
         metric=summary|undersized, depth=2,
         where=($value==1)})
