name: "[AI Content] VM Performance + Storage"
description: >
  Virtual machine CPU, memory, and virtual disk performance metrics.
  Designed for a "VM performance by datastore type" dashboard. Intended
  default sort: descending by CPU Ready — surfaces worst-offender VMs
  first. All columns use the latest/last sample (CURRENT transformation).
  Note: sort order and aggregation selection are not yet encoded in the
  loader/packager; set the default sort in the dashboard widget or view
  UI after import.

subject:
  adapter_kind: VMWARE
  resource_kind: VirtualMachine

# Intended default sort: cpu|readyPct descending.
# Intended aggregation: latest (CURRENT). Both are informational only —
# the v1 loader does not yet carry these fields into the wire format.
columns:
  - attribute: cpu|usage_average
    display_name: "CPU Usage (%)"
    unit: percent
  - attribute: cpu|readyPct
    display_name: "CPU Ready (%)"
    unit: percent
  - attribute: mem|usage_average
    display_name: "Memory Usage (%)"
    unit: percent
  - attribute: mem|balloonPct
    display_name: "Memory Balloon (%)"
    unit: percent
  - attribute: mem|swapoutRate_average
    display_name: "Memory Swap Out Rate"
    unit: ""
  - attribute: virtualDisk|numberReadAveraged_average
    display_name: "Read IOPS"
    unit: ""
  - attribute: virtualDisk|numberWriteAveraged_average
    display_name: "Write IOPS"
    unit: ""
  - attribute: virtualDisk|totalReadLatency_average
    display_name: "Read Latency"
    unit: ""
  - attribute: virtualDisk|totalWriteLatency_average
    display_name: "Write Latency"
    unit: ""
