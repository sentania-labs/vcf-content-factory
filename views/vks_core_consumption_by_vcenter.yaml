name: "[AI Content] VKS Core Consumption by vCenter"
description: >
  Per-vCenter breakdown of VKS (vSphere with Kubernetes / Tanzu) core
  consumption, replicating the output of the per-vCenter PowerCLI VKS
  core report. One row per VMwareAdapter Instance (vCenter). The
  headline compliance number is "VKS Cores" — the number of physical
  cores attributable to VKS workloads for licensing purposes. All
  other columns show the vCPU breakdown that feeds that calculation:
  total VM vCPUs, VKS worker vCPUs, Supervisor Control Plane vCPUs,
  vCLS vCPUs, VM Service vCPUs, regular (non-VKS) VM vCPUs, total
  physical cores, and the global vCPU-to-pCore ratio. Suitable as a
  dashboard widget target (no filters applied — shows all vCenters) and
  as a standalone scheduled report export.

subject:
  adapter_kind: VMwareAdapter
  resource_kind: VMwareAdapter Instance

