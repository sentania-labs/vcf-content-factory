id: 3ff3168f-9d44-4679-a604-df2d59afd210
name: "[VCF Content Factory] Test - Host VM Summary"
description: >
  Test view for distribution package validation. Shows powered-on
  VM count and average VM CPU per host. Safe to delete after testing.
subject:
  adapter_kind: VMWARE
  resource_kind: HostSystem

columns:
  - attribute: "cpu|usage_average"
    display_name: "Host CPU Usage (%)"
  - attribute: "sm_5021b8d5-4f22-47ea-9fcd-4a9e4f48297e"
    display_name: "Powered-On VMs"
  - attribute: "sm_e45818d0-d59f-4f6a-9179-77ff5686fa30"
    display_name: "Avg VM CPU (%)"

summary:
  display_name: "Totals"
  aggregation: SUM
