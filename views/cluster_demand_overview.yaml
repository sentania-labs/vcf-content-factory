id: 9c40102e-a85d-49de-8425-6e12ed7d5c40
name: "[VCF Content Factory] Cluster Demand Overview"
description: >
  Per-cluster demand and contention overview for capacity planning dashboards.
  Shows CPU and memory demand (7-day average and P95), post-HA capacity, and
  contention percentages so operators can identify clusters under demand pressure
  or experiencing contention at a glance. Acts as the cascade hub in a
  demand-driven capacity planning dashboard: receives selection from a Datacenter
  picker and feeds row selection downstream to detail views. Default sort is CPU
  contention descending (worst contention on top).

subject:
  adapter_kind: VMWARE
  resource_kind: ClusterComputeResource

summary: false

time_window:
  unit: DAYS
  count: 7

columns:
  # --- CPU block ---
  - attribute: cpu|demandmhz
    display_name: "CPU Demand Avg (7d)"
    unit: mhz
    transformation: AVG

  - attribute: cpu|demandmhz
    display_name: "CPU Demand P95 (7d)"
    unit: mhz
    transformation: PERCENTILE
    percentile: 95

  - attribute: cpu|haTotalCapacity_average
    display_name: "CPU Capacity (post-HA)"
    unit: mhz
    transformation: CURRENT

  - attribute: cpu|capacity_contentionPct
    display_name: "CPU Contention Avg (7d)"
    unit: percent
    transformation: AVG
    yellow_bound: 5.0
    orange_bound: 10.0
    red_bound: 20.0
    ascending_range: false

  # --- Memory block ---
  - attribute: mem|host_demand
    display_name: "Mem Demand Avg (7d)"
    unit: kb
    transformation: AVG

  - attribute: mem|host_demand
    display_name: "Mem Demand P95 (7d)"
    unit: kb
    transformation: PERCENTILE
    percentile: 95

  - attribute: mem|haTotalCapacity_average
    display_name: "Mem Capacity (post-HA)"
    unit: kb
    transformation: CURRENT

  - attribute: mem|host_contentionPct
    display_name: "Mem Contention Avg (7d)"
    unit: percent
    transformation: AVG
    yellow_bound: 2.0
    orange_bound: 5.0
    red_bound: 10.0
    ascending_range: false

# Sort note: default sort is CPU Contention Avg descending (worst first).
# View-level default sort is not a loader-supported field; apply this sort
# in the dashboard widget that references this view (sort_by_dir: desc,
# sort_by_column: "CPU Contention Avg (7d)").
