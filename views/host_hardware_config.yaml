name: "[VCF Content Factory] Host Hardware Configuration"
description: >
  Per-host hardware fleet overview — vendor, CPU model, BIOS version, and
  service tag for every ESXi host, grouped by parent cluster. Use to assess
  hardware homogeneity and BIOS firmware currency across the fleet. Drives
  the hardware configuration section of the Environment Configuration Status
  dashboard.

subject:
