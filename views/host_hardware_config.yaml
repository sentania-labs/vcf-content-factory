    unit: ""

  - attribute: hardware|vendorModel
    display_name: "Model"
    unit: ""

  - attribute: cpu|cpuModel
    display_name: "CPU Model"
    unit: ""

  - attribute: hardware|biosVersion
    display_name: "BIOS Version"
    unit: ""

  - attribute: hardware|serviceTag
    display_name: "Service Tag"
    unit: ""
