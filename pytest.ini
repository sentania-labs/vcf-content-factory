[pytest]
# ---------------------------------------------------------------------------
# Markers
# ---------------------------------------------------------------------------
# slow  — tests that build real zips, run full validators against the real
#         corpus, or otherwise take >~2s individually.  The default local run
#         excludes them (addopts below).  CI overrides with -m "" to run all.
#
# real_corpus — xdist isolation group.  Tests that READ the real content/
#               directories through subprocess validators (publish tests using
#               factory_repo=REPO_ROOT) and tests that WRITE temporary files
#               into those directories (test_validate_content_hook.py) must not
#               run concurrently.  Tagging them all with the same xdist_group
#               colocates them on a single worker where they run sequentially.
#               IMPORTANT: this group is only effective when using
#               --dist=loadgroup (see addopts / CI command).
markers =
    slow: marks tests as slow (deselect with -m "not slow")
    real_corpus: xdist group for tests that read or write the real content/ corpus

# ---------------------------------------------------------------------------
# Default: fast subset only
# ---------------------------------------------------------------------------
# Excludes `slow` tests on every plain `pytest` invocation so the local
# edit-test loop stays fast.
#
# CI MUST override this.  The workflow passes:
#   -m "" --override-ini="addopts="
# to run the full suite.  See .github/workflows/ci.yml for the comment
# explaining why.
#
# --dist=loadgroup is deliberately NOT in addopts: pytest-xdist is a dev
# dependency (requirements-dev.txt), and an xdist flag here would break
# plain `pytest` on a fresh clone without it.  When you pass -n, you MUST
# also pass --dist=loadgroup (tests/conftest.py enforces this) so the
# real_corpus group serializes correctly.
addopts = -m "not slow"
