# --------------------------------------------------------------------------
# Volume — list object with chained IO enrichment
#
# Primary metricSet (get_volumes): capacity + metadata, defines list membership.
# Chained metricSet (volume_util): per-volume IO from SYNO.Core.System.Utilization
#   fired once per volume row, substituting volume_id into the location param.
#
# Chain wiring:
#   chained_from: get_volumes   — parent metricSet (local_name = from_request)
#   bind.name: volume_id        — matches ${chain.volume_id} in volume_util params
#   bind.from_attribute: volume_id — attribute on each get_volumes row that
#                                    supplies the per-row volume path value
# --------------------------------------------------------------------------
- name: Volume
  key: volume
  type: INTERNAL
  icon: hard-drive-disks.svg
  is_world: false
  identifiers:
  - volume_id
  - volume_path
  name_expression: display_name
  metricSets:
  # PRIMARY — drives list membership (one Volume per row of data.volumes[])
  - from_request: get_volumes
    primary: true
    list_path: volumes
  # CHAINED — per-volume IO enrichment (one utilization call per Volume row)
  - from_request: volume_util
    chained_from: get_volumes
    list_path: ""
    bind:
    - name: volume_id
      from_attribute: volume_id
  metrics:
  # --- capacity / metadata (from get_volumes) ---
  - key: crashed
    label: Crashed
    usage: PROPERTY
    type: STRING
    source: metricset:get_volumes.crashed
  - key: deduped
    label: Deduped
    usage: PROPERTY
    type: STRING
    source: metricset:get_volumes.deduped
  - key: description
    label: Description
    usage: PROPERTY
    type: STRING
    source: metricset:get_volumes.description
  - key: display_name
    label: Display Name
    usage: PROPERTY
    type: STRING
    source: metricset:get_volumes.display_name
  - key: fs_type
    label: FS Type
    usage: PROPERTY
    type: STRING
    source: metricset:get_volumes.fs_type
  - key: is_encrypted
    label: Is Encrypted
    usage: PROPERTY
    type: STRING
    source: metricset:get_volumes.is_encrypted
  - key: pool_path
    label: Pool Path
    usage: PROPERTY
    type: STRING
    source: metricset:get_volumes.pool_path
  - key: raid_type
    label: RAID Type
    usage: PROPERTY
    type: STRING
    source: metricset:get_volumes.raid_type
  - key: readonly
    label: Readonly
    usage: PROPERTY
    type: STRING
    source: metricset:get_volumes.readonly
  - key: size_free_byte
    label: Size Free
    usage: METRIC
    type: NUMBER
    source: metricset:get_volumes.size_free_byte
  - key: size_total_byte
    label: Size Total
    usage: METRIC
    type: NUMBER
    source: metricset:get_volumes.size_total_byte
  - key: status
    label: Status
    usage: PROPERTY
    type: STRING
    source: metricset:get_volumes.status
  - key: volume_id
    label: Volume ID
    usage: PROPERTY
    type: STRING
    source: metricset:get_volumes.volume_id
  - key: volume_path
    label: Volume Path
    usage: PROPERTY
    type: STRING
    source: metricset:get_volumes.volume_path
  # --- per-volume IO (from chained volume_util) ---
  # Response path is data.space.volume[device=<volume_id>]
  - key: read_access
    label: Read IOPS
    usage: METRIC
    type: NUMBER
    source: metricset:volume_util.space.volume.read_access
  - key: write_access
    label: Write IOPS
    usage: METRIC
    type: NUMBER
    source: metricset:volume_util.space.volume.write_access
  - key: read_byte
    label: Read Throughput
    usage: METRIC
    type: NUMBER
    source: metricset:volume_util.space.volume.read_byte
  - key: write_byte
    label: Write Throughput
    usage: METRIC
    type: NUMBER
    source: metricset:volume_util.space.volume.write_byte
  - key: utilization_pct
    label: Volume Utilization
    usage: METRIC
    type: NUMBER
    source: metricset:volume_util.space.volume.utilization

