  metrics:
  - key: device_type
    label: Device Type
    usage: PROPERTY
    type: STRING
    source: metricset:get_storage_pools.device_type
  - key: id
    label: ID
    usage: PROPERTY
    type: STRING
    source: metricset:get_storage_pools.id
  - key: num_id
    label: Num ID
    usage: PROPERTY
    type: NUMBER
    source: metricset:get_storage_pools.num_id
  - key: pool_path
    label: Pool Path
    usage: PROPERTY
