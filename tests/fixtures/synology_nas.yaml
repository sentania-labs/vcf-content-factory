  - key: 5min_load
    label: 5min Load
    usage: METRIC
    type: NUMBER
    source: metricset:utilization.cpu.5min_load
  - key: other_load
    label: Other Load
    usage: METRIC
    type: NUMBER
    source: metricset:utilization.cpu.other_load
  - key: system_load
    label: System Load
    usage: METRIC
    type: NUMBER
    source: metricset:utilization.cpu.system_load
  - key: user_load
    label: User Load
    usage: METRIC
    type: NUMBER
    source: metricset:utilization.cpu.user_load
  - key: avail_real
