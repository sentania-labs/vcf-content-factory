# Synology NAS Management Pack — v2 Strategy C
#
# Architecture summary (designs/synology-mp-v1.md §"Strategy C"):
#   - Synology Diskstation is is_singleton: true — one-per-adapter-instance
#     named entity that carries root-device metrics (CPU, memory, temperature,
#     uptime, model, serial, hostname). Identified by serial number.
#     It deliberately has NO explicit relationships to peer objects.
#     Implicit adapter-instance parentage gives every peer object its root edge.
#   - Peer objects (Storage Pool, Volume, Disk, iSCSI LUN) discover from
#     dedicated list requests and join by field_match relationships.
#   - Volume IO comes from SYNO.Core.System.Utilization as a chained metricSet
#     on Volume — one utilization call per volume row, filtered by volume path.
#
# v2 world-kind model: NONE. The adapter instance serves as the topology root.
#   The loader's world_count <= 1 constraint (relaxed in this tooling cycle)
#   permits zero world kinds — no stub kind is required or present.
#   A future v3 may add a "Synology World" empty stub (is_world: true, no
#   identifiers, no metrics) if fleet-level aggregation super metrics across
#   multiple Synology adapter instances are authored later.
#
# Authoring history:
#   v2 (2026-04-29): Diskstation corrected to is_singleton: true (was is_world).
#           is_world means cross-instance anchor — one per Ops deployment, empty
#           stub, no identifiers, no metrics. is_singleton means one-per-
#           adapter-instance named entity — has identifiers (serial), has
#           metrics, identified in Ops by serial. Two credentialed NAS units
#           under is_world would silently collide; under is_singleton each gets
#           its own isolated object tree.
#           Chained volume_util metricSet added (chained_from: get_volumes +
#           bind[]) to satisfy the loader's cross-MP dangling-chain guardrail.
#           paging: blocks absent — field is RETIRED as of 2026-04-21;
#           offset/limit passed as mandatory params where Synology API requires.
#           World stub removed entirely (loader relaxed to world_count <= 1).
#
name: Synology NAS
version: 1.0.0
build_number: 1
author: "VCF Content Factory"
adapter_kind: "mpb_synology_nas"
adapter_class: "SynologyNAS"
description: Monitors a Synology DiskStation NAS running DSM 7.x. Collects rootdevice health (CPU, memory, temperature, uptime),
  storage topology (pools, volumes, disks), pervolume IO, and iSCSI LUN inventory. Uses discrete perentity storage API endpoints
  (SYNO.Core.Storage.) matching the knownvalid reference build. Designed for DS1520 but applicable to any adminaccessible
  DSM 7 unit.
source:
  port: 5001
  ssl: NO_VERIFY
  base_path: webapi
  timeout: 30
  max_retries: 2
  max_concurrent: 15
  auth:
    preset: cookie_session
    credentials:
    - key: username
      label: username
      sensitive: false
    - key: passwd
      label: passwd
      sensitive: true
    login:
      method: GET
      path: auth.cgi
      params:
      - key: api
        value: SYNO.API.Auth
      - key: version
        value: '3'
      - key: method
        value: login
      - key: account
        value: ${credentials.username}
      - key: passwd
        value: ${credentials.passwd}
      - key: session
        value: FileStation
      - key: format
        value: cookie
    extract:
      location: HEADER
      name: Set-Cookie
      bind_to: session.set_cookie
    inject:
    - type: header
      name: id
      value: ${session.set_cookie}
    logout:
      method: DELETE
      path: auth.cgi
      params:
      - key: method
        value: logout
      - key: version
        value: '3'
      - key: api
        value: SYNO.API.Auth
  test_request:
    method: GET
    path: entry.cgi
    params:
    - key: api
      value: SYNO.FileStation.Info
    - key: method
      value: get
    - key: version
      value: '2'
requests:
# Root-device CPU/memory metrics (unfiltered). Consumed by Diskstation.
- name: utilization
  method: GET
  path: entry.cgi
  params:
  - key: api
    value: SYNO.Core.System.Utilization
  - key: version
    value: '1'
  - key: method
    value: get
  response_path: data
# Per-volume IO metrics — chained off get_volumes, one call per volume row.
# ${chain.volume_id} is substituted with each volume's volume_id field.
- name: volume_util
  method: GET
  path: entry.cgi
  params:
  - key: api
    value: SYNO.Core.System.Utilization
  - key: version
    value: '1'
  - key: method
    value: get
  - key: location
    value: ${chain.volume_id}
  response_path: data
# Volume list — capacity, metadata, join fields.
- name: get_volumes
  method: GET
  path: entry.cgi
  params:
  - key: version
    value: '1'
  - key: method
    value: list
  - key: location
    value: internal
  - key: offset
    value: '0'
  - key: limit
    value: '-1'
  - key: api
    value: SYNO.Core.Storage.Volume
  response_path: data
# System info — model, serial, CPU, RAM, temperature, firmware.
- name: system
  method: GET
  path: entry.cgi
  params:
  - key: api
    value: SYNO.Core.System
  - key: version
    value: '3'
  - key: method
    value: info
  response_path: data
# FileStation info — hostname.
- name: filestation
  method: GET
  path: entry.cgi
  params:
  - key: api
    value: SYNO.FileStation.Info
  - key: version
    value: '1'
  - key: method
    value: get
  response_path: data
# Storage pools — capacity, RAID type, pool_path join field.
- name: get_storage_pools
  method: GET
  path: entry.cgi
  params:
  - key: api
    value: SYNO.Core.Storage.Pool
  - key: method
    value: list
  - key: limit
    value: '-1'
  - key: offset
    value: '0'
  - key: version
    value: '1'
  response_path: data
# Disk list — SATA + NVMe, used_by join field.
- name: get_disks
  method: GET
  path: entry.cgi
  params:
  - key: api
    value: SYNO.Core.Storage.Disk
  - key: method
    value: list
  - key: version
    value: '1'
  - key: location
    value: internal
  - key: limit
    value: '-1'
  - key: offset
    value: '0'
  response_path: data
# iSCSI LUN list — size, location (vol_path join), type.
- name: luns
  method: GET
  path: entry.cgi
  params:
  - key: api
    value: SYNO.Core.ISCSI.LUN
  - key: version
    value: '1'
  - key: method
    value: list
  response_path: data
# General system info sub-type: storage (for Diskstation storage_info metrics).
- name: storage_info
  method: GET
  path: entry.cgi
  params:
  - key: api
    value: SYNO.Core.System
  - key: type
    value: storage
  - key: method
    value: info
  - key: version
    value: '1'
  response_path: data
# General system info sub-type: network.
- name: network_info
  method: GET
  path: entry.cgi
  params:
  - key: api
    value: SYNO.Core.System
  - key: type
    value: network
  - key: version
    value: '1'
  - key: method
    value: info
  response_path: data
object_types:
# v2 has no world kind by design — see file header for rationale and v3 plan.

# --------------------------------------------------------------------------
# Synology Diskstation — singleton (one-per-adapter-instance, Strategy C)
#
# is_singleton: true renders isListObject: false in the MPB wire format.
# Carries identifiers (serial) and a name_expression (hostname).
# No identity: block — that field is is_world only (cross-instance anchor
# tier declaration). Singletons are identified by their identifiers list.
#
# All three metricSets fire once per collection cycle in scalar context
# (list_path: ""). No primary: true — singleton objects disallow it.
# No explicit relationships from here — implicit adapter-instance parentage
# gives every peer object its root edge automatically.
# --------------------------------------------------------------------------
- name: Synology Diskstation
  key: synology_diskstation
  type: INTERNAL
  icon: media-changer.svg
  is_singleton: true
  identifiers:
  - serial
  name_expression: hostname
  metricSets:
  - from_request: system
    list_path: ""
  - from_request: filestation
    list_path: ""
  - from_request: utilization
    list_path: ""
  metrics:
  - key: cpu_clock_speed
    label: CPU Clock Speed
    usage: PROPERTY
    type: NUMBER
    source: metricset:system.cpu_clock_speed
  - key: cpu_cores
    label: CPU Cores
    usage: PROPERTY
    type: NUMBER
    source: metricset:system.cpu_cores
  - key: cpu_family
    label: CPU Family
    usage: PROPERTY
    type: STRING
    source: metricset:system.cpu_family
  - key: cpu_series
    label: CPU Series
    usage: PROPERTY
    type: STRING
    source: metricset:system.cpu_series
  - key: cpu_vendor
    label: CPU Vendor
    usage: PROPERTY
    type: STRING
    source: metricset:system.cpu_vendor
  - key: enabled_ntp
    label: Enabled NTP
    usage: PROPERTY
    type: STRING
    source: metricset:system.enabled_ntp
  - key: firmware_date
    label: Firmware Date
    usage: PROPERTY
    type: STRING
    source: metricset:system.firmware_date
  - key: firmware_ver
    label: Firmware Version
    usage: PROPERTY
    type: STRING
    source: metricset:system.firmware_ver
  - key: model
    label: Model
    usage: PROPERTY
    type: STRING
