  - key: hostname
    label: Hostname
    usage: PROPERTY
    type: STRING
    source: metricset:filestation.hostname
  - key: 15min_load
    label: 15min Load
    usage: METRIC
    type: NUMBER
    source: metricset:utilization.cpu.15min_load
  - key: 1min_load
    label: 1min Load
    usage: METRIC
    type: NUMBER
