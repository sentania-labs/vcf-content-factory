relationships:
# Storage Pool → Volume (join on pool_path)
- parent: storage_pool
  child: volume
  scope: field_match
  parent_expression: pool_path
  child_expression: pool_path
# Storage Pool → Disk (SATA disks — used_by carries pool id)
- parent: storage_pool
  child: disks
  scope: field_match
  parent_expression: id
  child_expression: used_by
# Volume → iSCSI LUN (join on vol_path / location)
- parent: volume
  child: iscsi_lun
  scope: field_match
  parent_expression: volume_path
  child_expression: location

# ==========================================================================
# TOOLSET GAP: getSession Content-Type header
#
# The working Synology export has:
#   source.source.authentication.sessionSettings.getSession.headers:
#     [{key: "Content-Type", value: "application/json", type: "REQUIRED"}]
#
# The factory auth grammar (`source.auth.login:`) has no per-request headers
# knob — only `method`, `path`, and `params` are accepted on the login block.
# The global `Content-Type: application/json` header is typically provided by
# the MPB adapter runtime, so this gap is unlikely to be a runtime blocker,
# but it produces a diff against the working export.
#
# Resolution: the `login:` block in `management_pack_authoring.md §auth`
# needs a `headers:` list accepted by the loader and emitted by the renderer
# into `sessionSettings.getSession.headers`. Defer to tooling.
#
# TOOLSET GAP: paging blocks on 6 requests
#
# management_pack_authoring.md §Pagination states that the `paging:` YAML
# grammar is RETIRED as of 2026-04-21 and the field is ignored at render time.
# The working export carries paging sub-trees on 6 requests (get_volumes,
# get_disks, get_storage_pools, storage_info, utilization, network_info) that
# MPB populates from live API introspection at import time — they are a runtime
# artifact and cannot be reproduced from static YAML. No YAML change needed;
# MPB will regenerate them from the live endpoint at import time.
# ==========================================================================
