name: vks-core-consumption
description: >
  VKS Core Consumption package for VCF Operations. Tracks vCPU consumption
  across all VKS VM classifications — worker nodes, control plane, vCLS,
  Supervisor, node images, pod VMs, VM Service, and regular VMs — plus a
  global vCPU-to-pCore ratio super metric. Includes a per-vCenter list view
  and a consumption dashboard for capacity planning and chargeback reporting.
supermetrics:
  - supermetrics/vks_vcls_vcpu.yaml
  - supermetrics/vks_supervisor_vcpu.yaml
  - supermetrics/vks_global_vcpu_pcore_ratio.yaml
  - supermetrics/vks_regular_vm_vcpu.yaml
  - supermetrics/vks_worker_vcpu.yaml
  - supermetrics/vks_nodeimage_vcpu.yaml
  - supermetrics/vks_cp_vcpu.yaml
  - supermetrics/vks_vmservice_vcpu.yaml
  - supermetrics/vks_cores.yaml
  - supermetrics/vks_pod_vcpu.yaml
views:
  - views/vks_core_consumption_by_vcenter.yaml
dashboards:
  - dashboards/vks_core_consumption.yaml
customgroups: []
reports:
  - reports/vks_core_consumption_report.yaml
