name: vks-core-consumption
description: >
  VKS Core Consumption package for VCF Operations. Tracks vCPU consumption
  across VKS VM classifications — VKS guest nodes (control plane + workers
  combined), vCLS, Supervisor, vSphere Pods, VM Service, and regular VMs —
  plus a global vCPU-to-pCore ratio super metric. Includes a per-vCenter
  list view and a consumption dashboard for capacity planning and
  chargeback reporting. Markers chosen to work on both VCF Operations 9.x
  and Aria Operations 8.18 (productName contains "Kubernetes" matches both
  VKS and TKGS node images; Supervisor CP identified by VM-name pattern).
supermetrics:
  - content/supermetrics/vks_vcls_vcpu.yaml
  - content/supermetrics/vks_supervisor_vcpu.yaml
  - content/supermetrics/vks_global_vcpu_pcore_ratio.yaml
  - content/supermetrics/vks_regular_vm_vcpu.yaml
  - content/supermetrics/vks_nodeimage_vcpu.yaml
  - content/supermetrics/vks_vmservice_vcpu.yaml
  - content/supermetrics/vks_cores.yaml
  - content/supermetrics/vks_pod_vcpu.yaml
views:
  - content/views/vks_core_consumption_by_vcenter.yaml
dashboards:
  - content/dashboards/vks_core_consumption.yaml
customgroups: []
reports:
  - content/reports/vks_core_consumption_report.yaml
