name: idps-planner
display_name: IDPS Planner
description: >
  vDefend IDPS resource-monitoring dashboard for VCF Operations. Tracks
  Packets Per Second and Throughput against the Classic Mode bypass
  thresholds (140k PPS / 9 Gbps), with peak-based metrics (5-minute peak,
  period peak, 95th percentile) for safety-first capacity planning. Full
  description in the bundle README.
factory_native: false
author: Ryan Pletka, Brock Peterson, Joe Tietz, Geoff Shukin, Scott Bowe
license: MIT
source:
  captured_at: '2026-04-17'
supermetrics:
- idps-planner/supermetrics/IDPS Net Usage All VMs.yaml
- idps-planner/supermetrics/IDPS Net Transmit All VMs.yaml
- idps-planner/supermetrics/IDPS Net Receive All VMs.yaml
- idps-planner/supermetrics/IDPS Packets per second All VMs.yaml
- idps-planner/supermetrics/IDPS Peak PPS within cycle All VMs.yaml
views:
- idps-planner/views/IDPS Planner Host Metrics.yaml
- idps-planner/views/IDPS IDPS Planner VM Metrics.yaml
- idps-planner/views/IDPS Planner - vCenter Selection.yaml
- idps-planner/views/IDPS Planner - Datacenter Selection.yaml
- idps-planner/views/IDPS Planner - Cluster Selection.yaml
dashboards:
- idps-planner/dashboards/IDPS Planner.yaml
builtin_metric_enables:
- adapter_kind: VMWARE
  resource_kind: VirtualMachine
  metric_key: net|packetsPerSec
  reason: required by dashboard 'IDPS Planner' widget '85c05c6b-e60d-4b2c-a6c0-af2fe2ec472e'
    (Scoreboard)
