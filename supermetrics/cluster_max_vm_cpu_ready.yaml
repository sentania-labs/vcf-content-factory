id: 30d2c6e5-34f1-46b1-9d83-45635907111f
name: "[VCF Content Factory] Cluster - Max VM CPU Ready (%)"
resource_kinds:
  - resource_kind_key: ClusterComputeResource
    adapter_kind_key: VMWARE
description: >
  Maximum CPU ready percent observed across powered-on virtual machines in
  the cluster. Surfaces worst-case VM scheduling contention that cluster
  averages hide. Assigned to ClusterComputeResource; depth=2 traverses
  Cluster -> Host -> VM, filtered to powered-on VMs via sys|poweredOn
  (numeric stat: 1=on, 0=off) rather than summary|runtime|powerState, which
  is a string property the SM engine cannot evaluate numerically.
formula: |
  max(${adaptertype=VMWARE, objecttype=VirtualMachine,
       metric=cpu|readyPct, depth=2,
       where=(${metric=sys|poweredOn}==1)})
