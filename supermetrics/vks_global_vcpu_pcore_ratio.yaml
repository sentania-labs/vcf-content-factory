id: ff235a3b-ed97-46b6-8f9d-7b52e55c9e6e
name: "[VCF Content Factory] Global vCPU-to-pCore Ratio"
resource_kinds:
  - resource_kind_key: ClusterComputeResource
    adapter_kind_key: VMWARE
  - resource_kind_key: Datacenter
    adapter_kind_key: VMWARE
  - resource_kind_key: VMwareAdapter Instance
    adapter_kind_key: VMWARE
description: >
  Ratio of total allocated vCPUs to total physical cores at the assigned
  object's scope, using native built-in stats that are already aggregated at
  Cluster, Datacenter, and VMwareAdapter Instance level. No child-object
  iteration is needed: cpu|vcpus_allocated_on_all_vms gives the numerator and
  cpu|corecount_provisioned gives the denominator, both sourced directly from
  the same object the SM evaluates (this). Recon confirmed both stats are live
  on the lab at all three resource kinds.

  A value of 4.0 means four vCPUs are allocated per physical core. This is the
  global (all-VM-type) ratio; see [VCF Content Factory] VKS Cores (count) for the
  VKS-specific core-equivalent calculation.
formula: |
  ${this, metric=cpu|vcpus_allocated_on_all_vms}
  /
  ${this, metric=cpu|corecount_provisioned}
