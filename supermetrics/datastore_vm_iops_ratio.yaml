id: 8b434aa5-a5ec-4b8a-95a2-0655bd6880a7
name: "[VCF Content Factory] Datastore - VM IOPS Skew (max/avg)"
resource_kinds:
  - resource_kind_key: Datastore
    adapter_kind_key: VMWARE
description: >
  Ratio of the highest VM IOPS to the average VM IOPS on the datastore.
  A high value indicates a noisy-neighbor situation. Demonstrates resource
  entry aliasing so the same source set is iterated only once per side.
formula: |
  (max(${adaptertype=VMWARE, objecttype=VirtualMachine,
        attribute=virtualDisk|commandsAveraged_average, depth=-1,
        where=($value>=0)} as vmiops) + 0.0001)
  /
  (avg(vmiops) + 0.0001)
