id: 2308ba66-91c6-43c8-95e3-33fd2ee51f73
name: "[VCF Content Factory] VM Service vCPU (count)"
resource_kinds:
  - resource_kind_key: ClusterComputeResource
    adapter_kind_key: VMWARE
  - resource_kind_key: Datacenter
    adapter_kind_key: VMWARE
  - resource_kind_key: VMwareAdapter Instance
    adapter_kind_key: VMWARE
description: >
  Sum of provisioned vCPUs across all VM Service VMs (VMOperator-managed VMs)
  within the assigned object's scope. VM Service VMs are identified by
  summary|config|type equals VMOperator. These VMs are provisioned through
  the vSphere VM Service capability for Kubernetes workloads.

  Assigned to ClusterComputeResource, Datacenter, and VMwareAdapter Instance
  so a single formula yields per-cluster, per-DC, and per-vCenter rollups.
formula: |
  sum(${adaptertype=VMWARE, objecttype=VirtualMachine,
        metric=config|hardware|num_Cpu, depth=10,
        where="summary|config|type equals VMOperator"})
