id: a2b233be-ab55-46cc-816d-5ca5f10fc477
name: "[VCF Content Factory] Supervisor Control Plane vCPU (count)"
resource_kinds:
  - resource_kind_key: ClusterComputeResource
    adapter_kind_key: VMWARE
  - resource_kind_key: Datacenter
    adapter_kind_key: VMWARE
  - resource_kind_key: VMwareAdapter Instance
    adapter_kind_key: VMWARE
description: >
  Sum of provisioned vCPUs across all Supervisor control plane VMs within the
  assigned object's scope. Filter uses config|name contains
  "SupervisorControlPlaneVM" — the VM naming convention is provisioner-
  controlled and stable across VCF versions. This replaces the earlier
  productName-equals filter, which diverges between versions: v9 sets
  productName="vSphere Supervisor" but v8 (VCF 5.2 / Aria Ops 8.18) sets
  productName="Photon OS" (ambiguous). vCLS VMs also carry
  type=SupervisorControlPlane but begin with "vCLS-", not
  "SupervisorControlPlaneVM", so the name filter excludes them cleanly.
  Single-condition string where clauses are the supported pattern;
  compound && with string operators silently fail in the VCF Ops engine.

  Assigned to ClusterComputeResource, Datacenter, and VMwareAdapter Instance
  so a single formula yields per-cluster, per-DC, and per-vCenter rollups.
formula: |
  sum(${adaptertype=VMWARE, objecttype=VirtualMachine,
        metric=config|hardware|num_Cpu, depth=10,
        where="config|name contains SupervisorControlPlaneVM"})
