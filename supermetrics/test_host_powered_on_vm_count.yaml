id: 5021b8d5-4f22-47ea-9fcd-4a9e4f48297e
name: "[VCF Content Factory] Test - Host Powered-On VM Count"
resource_kinds:
  - resource_kind_key: HostSystem
    adapter_kind_key: VMWARE
description: >
  Test super metric for distribution package validation. Counts
  powered-on VMs per host. Safe to delete after testing.
formula: |
  count(${adaptertype=VMWARE, objecttype=VirtualMachine, metric=sys|poweredOn, depth=1, where=($value == 1)})
