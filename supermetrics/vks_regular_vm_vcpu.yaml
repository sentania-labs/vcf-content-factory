id: b16e3bb4-b8aa-4844-af10-d9b30702318a
name: "[VCF Content Factory] Regular VM vCPU (count)"
resource_kinds:
  - resource_kind_key: ClusterComputeResource
    adapter_kind_key: VMWARE
  - resource_kind_key: Datacenter
    adapter_kind_key: VMWARE
  - resource_kind_key: VMwareAdapter Instance
    adapter_kind_key: VMWARE
description: >
  Sum of provisioned vCPUs across all standard (non-infrastructure) VMs within
  the assigned object's scope. Regular VMs are identified by
  summary|config|type equals default, which is the type value assigned to
  ordinary user workload VMs. This excludes Supervisor control plane VMs,
  vCLS VMs, VM Service VMs, and VKS worker nodes, which are captured by
  separate SMs in this bundle.

  Assigned to ClusterComputeResource, Datacenter, and VMwareAdapter Instance
  so a single formula yields per-cluster, per-DC, and per-vCenter rollups.
formula: |
  sum(${adaptertype=VMWARE, objecttype=VirtualMachine,
        metric=config|hardware|num_Cpu, depth=10,
        where="summary|config|type equals default"})
