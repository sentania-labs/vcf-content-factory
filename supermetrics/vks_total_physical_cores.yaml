id: a01da816-857a-45a0-9d90-928d327a5020
name: "[AI Content] vCenter - Total Physical Cores (count)"
resource_kinds:
  - resource_kind_key: VMwareAdapter Instance
    adapter_kind_key: VMWARE
description: >
  Sum of physical CPU cores across all HostSystem objects under this vCenter adapter
  instance, excluding nested ESX hosts (bare-metal only). Nested ESX hosts are
  identified by hardware|vendor containing 'VMware' (vSphere-in-vSphere), which the
  !contains filter removes. hardware|cpuInfo|numCpuCores is the physical core count
  per socket aggregated across all sockets on the host, confirmed in
  metrics-properties.md (HostSystem Hardware Properties). Both property keys
  recon-verified 2026-04-08. This is the denominator for the Global vCPU-to-pCore
  Ratio (SM id: 50845fed-0a98-4885-bd57-ac6bc961e48d).
formula: |
  sum(${adaptertype=VMWARE, objecttype=HostSystem,
        metric=hardware|cpuInfo|numCpuCores, depth=10,
        where=(${metric=hardware|vendor} !contains 'VMware')})
