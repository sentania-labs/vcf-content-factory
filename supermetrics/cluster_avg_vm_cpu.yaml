id: c3013649-1ba4-40e4-88bb-89c4ff1495cd
name: "[VCF Content Factory] Cluster - Avg Powered-On VM CPU Usage (%)"
resource_kinds:
  - resource_kind_key: ClusterComputeResource
    adapter_kind_key: VMWARE
description: >
  Average CPU usage across all powered-on virtual machines in the cluster.
  Assigned to ClusterComputeResource; depth=2 traverses Cluster -> Host -> VM.
  Filters to powered-on VMs via sys|poweredOn (numeric stat: 1=on, 0=off)
  rather than summary|runtime|powerState, which is a string property the SM
  engine cannot evaluate numerically.
formula: |
  avg(${adaptertype=VMWARE, objecttype=VirtualMachine,
       metric=cpu|usage_average, depth=2,
       where=(${metric=sys|poweredOn}==1)})
