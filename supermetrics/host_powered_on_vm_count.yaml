id: bcf8e651-38eb-46ce-96e1-1d4c7dd13f83
name: "[VCF Content Factory] Host - Powered-On VM Count"
resource_kinds:
  - resource_kind_key: HostSystem
    adapter_kind_key: VMWARE
description: >
  Number of powered-on VMs on this host. Assigned to HostSystem.
  Uses sys|poweredOn (numeric stat: 1.0 = powered on, 0.0 = powered off)
  rather than summary|runtime|powerState (a string property the super metric
  engine cannot aggregate). The where clause filters to VMs where
  sys|poweredOn == 1 before counting.
formula: |
  count(${adaptertype=VMWARE, objecttype=VirtualMachine,
         metric=sys|poweredOn, depth=1,
         where=($value==1)})
