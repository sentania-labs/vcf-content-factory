id: b847549b-7d32-4157-95a2-9f9f26036726
name: "[AI Content] vCenter - vCLS vCPU (count)"
resource_kinds:
  - resource_kind_key: VMwareAdapter Instance
    adapter_kind_key: VMWARE
description: >
  Sum of provisioned vCPUs for vSphere Cluster Services (vCLS) agent VMs under
  this vCenter adapter instance. vCLS VMs reside in the well-known "vCLS" folder
  that vCenter creates in every datacenter. Selected by
  summary|parentFolder = vCLS, which is the property key the [AI Content] vCLS VMs
  custom group uses. Property key recon-verified 2026-04-08.
formula: |
  sum(${adaptertype=VMWARE, objecttype=VirtualMachine,
        metric=config|hardware|numCpu, depth=10,
        where=(${metric=summary|parentFolder} equals 'vCLS')})
