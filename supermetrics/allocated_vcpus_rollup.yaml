name: "[AI Content] Allocated vCPUs (Rollup)"
resource_kinds:
  - resource_kind_key: HostSystem
    adapter_kind_key: VMWARE
  - resource_kind_key: ClusterComputeResource
    adapter_kind_key: VMWARE
  - resource_kind_key: Datacenter
    adapter_kind_key: VMWARE
description: >
  Sum of provisioned vCPUs across all descendant virtual machines.
  A single formula assigned to HostSystem, ClusterComputeResource and
  Datacenter: at each level it iterates every VMWARE VirtualMachine
  found within depth=10 hops and sums cpu|corecount_provisioned, giving
  total allocated vCPU count at that object's scope. Pattern mirrors
  [Custom] Sum of Powered off vCPUs, which assigns one SM to multiple
  container kinds with depth=10.
formula: |
  sum(${adaptertype=VMWARE, objecttype=VirtualMachine,
        metric=cpu|corecount_provisioned, depth=10})
