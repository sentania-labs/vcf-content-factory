id: 49dacfe5-f4ae-4577-b735-115fed36b045
name: "[AI Content] vCenter - Total VM vCPU (count)"
resource_kinds:
  - resource_kind_key: VMwareAdapter Instance
    adapter_kind_key: VMWARE
description: >
  Sum of provisioned vCPUs across every VirtualMachine under this vCenter adapter
  instance. depth=10 ensures all VMs are reached regardless of folder/pool nesting
  depth. This is the denominator component for the VKS core-consumption report and
  the baseline for per-bucket vCPU accounting. Metric key config|hardware|numCpu
  confirmed in metrics-properties.md (VirtualMachine Configuration Properties).
formula: |
  sum(${adaptertype=VMWARE, objecttype=VirtualMachine,
        metric=config|hardware|numCpu, depth=10})
